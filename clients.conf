###############################################################################
#  Open NAC — FreeRADIUS Clients (NAS Devices)
#  Эквивалент: Cisco ISE Network Devices → Network Device Groups
#
#  Каждое сетевое устройство, отправляющее RADIUS-запросы,
#  должно быть здесь описано (или в SQL через read_clients = yes)
#
#  Production: используйте SQL-таблицу `nas` для динамического управления
#  через Admin UI. Этот файл — для начальной настройки и тестирования.
###############################################################################

#--- Localhost (тестирование) -----------------------------------------------

client localhost {
	ipaddr = 127.0.0.1
	secret = testing123
	shortname = localhost
	nastype = other
}

client localhost_ipv6 {
	ipv6addr = ::1
	secret = testing123
	shortname = localhost-v6
}

#--- Docker internal network ------------------------------------------------

client docker-network {
	ipaddr = 172.30.0.0/24
	secret = ${DOCKER_RADIUS_SECRET:-nac_internal_secret}
	shortname = docker-internal
	nastype = other
}

#--- Policy Engine (для CoA requests) --------------------------------------

client policy-engine {
	ipaddr = 172.30.0.20
	secret = ${COA_SECRET:-changeme_coa_secret}
	shortname = policy-engine
	nastype = other
}

