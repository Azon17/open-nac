###############################################################################
#  Open NAC — eapol_test конфигурации для тестирования
#
#  Установка: apt install eapoltest  (или сборка из wpa_supplicant)
#
#  Использование:
#    eapol_test -c peap-mschapv2.conf -a 127.0.0.1 -p 1812 -s testing123
#    eapol_test -c eap-tls.conf -a 127.0.0.1 -p 1812 -s testing123
#
#  Коды возврата:
#    0 = Access-Accept (успех)
#    1 = Access-Reject (отказ)
#    2 = Timeout (нет ответа)
###############################################################################

# === Файл: peap-mschapv2.conf ===
# Тестирует: PEAP → MSCHAPv2 → Active Directory
# Это самый распространённый метод для Windows-клиентов

# network={
# 	ssid="TEST"
# 	key_mgmt=WPA-EAP
# 	eap=PEAP
# 	identity="testuser@corp.local"
# 	anonymous_identity="anonymous@corp.local"
# 	password="TestPassword123"
# 	phase2="auth=MSCHAPV2"
#
# 	# Не проверять серверный сертификат (только для тестов!)
# 	# В production: ca_cert="/path/to/ca.pem"
# 	phase1="peaplabel=0"
# }


