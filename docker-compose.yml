###############################################################################
#  Open NAC System — Docker Compose (Central Site / HQ)
#  FIXED: official MariaDB 11.4 with Galera, official Redis 7.4, verified tags
###############################################################################

name: open-nac

x-common-env: &common-env
  TZ: Europe/Amsterdam
  MYSQL_HOST: mariadb-1
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: ${MYSQL_DATABASE:-radius}
  MYSQL_USER: ${MYSQL_USER:-radius}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme_radius_pwd}
  REDIS_HOST: redis-1
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092

x-mariadb-common: &mariadb-common
  image: mariadb:11.4
  restart: unless-stopped
  deploy:
    resources:
      limits:
        memory: 4G
        cpus: "2"

x-healthcheck-db: &healthcheck-db
  test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
  interval: 15s
  timeout: 5s
  retries: 10
  start_period: 90s

x-healthcheck-redis: &healthcheck-redis
  test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_pwd}", "ping"]
  interval: 10s
  timeout: 3s
  retries: 5

networks:
  nac-core:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
  nac-mgmt:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.1.0/24
  nac-data:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.2.0/24

volumes:
  galera-1-data:
  galera-2-data:
  galera-3-data:
  redis-1-data:
  redis-2-data:
  redis-3-data:
  kafka-data:
  zookeeper-data:
  elasticsearch-data:
  grafana-data:
  ejbca-data:
  prometheus-data:

services:

  #==========================================================================
  #  MariaDB Galera Cluster (3 nodes, official mariadb:11.4)
  #==========================================================================

  mariadb-1:
    <<: *mariadb-common
    container_name: nac-mariadb-1
    hostname: mariadb-1
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-changeme_root_pwd}
      MARIADB_DATABASE: ${MYSQL_DATABASE:-radius}
      MARIADB_USER: ${MYSQL_USER:-radius}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD:-changeme_radius_pwd}
    command: >
      --wsrep-new-cluster
      --wsrep-on=ON
      --wsrep-provider=/usr/lib/galera/libgalera_smm.so
      --wsrep-cluster-name=nac_galera
      --wsrep-cluster-address=gcomm://
      --wsrep-node-name=mariadb-1
      --wsrep-node-address=mariadb-1
      --wsrep-sst-method=rsync
      --binlog-format=ROW
      --default-storage-engine=InnoDB
      --innodb-autoinc-lock-mode=2
      --innodb-buffer-pool-size=1G
      --innodb-log-file-size=256M
      --max-connections=500
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - galera-1-data:/var/lib/mysql
      - ./config/mariadb/initdb.d:/docker-entrypoint-initdb.d:ro
    networks:
      nac-data:
        ipv4_address: 172.30.2.10
    healthcheck: *healthcheck-db

  mariadb-2:
    <<: *mariadb-common
    container_name: nac-mariadb-2
    hostname: mariadb-2
    depends_on:
      mariadb-1:
        condition: service_healthy
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-changeme_root_pwd}
    command: >
      --wsrep-on=ON
      --wsrep-provider=/usr/lib/galera/libgalera_smm.so
      --wsrep-cluster-name=nac_galera
      --wsrep-cluster-address=gcomm://mariadb-1,mariadb-2,mariadb-3
      --wsrep-node-name=mariadb-2
      --wsrep-node-address=mariadb-2
      --wsrep-sst-method=rsync
      --binlog-format=ROW
      --default-storage-engine=InnoDB
      --innodb-autoinc-lock-mode=2
      --innodb-buffer-pool-size=1G
      --max-connections=500
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - galera-2-data:/var/lib/mysql
    networks:
      nac-data:
        ipv4_address: 172.30.2.11
    healthcheck: *healthcheck-db

  mariadb-3:
    <<: *mariadb-common
    container_name: nac-mariadb-3
    hostname: mariadb-3
    depends_on:
      mariadb-1:
        condition: service_healthy
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-changeme_root_pwd}
    command: >
      --wsrep-on=ON
      --wsrep-provider=/usr/lib/galera/libgalera_smm.so
      --wsrep-cluster-name=nac_galera
      --wsrep-cluster-address=gcomm://mariadb-1,mariadb-2,mariadb-3
      --wsrep-node-name=mariadb-3
      --wsrep-node-address=mariadb-3
      --wsrep-sst-method=rsync
      --binlog-format=ROW
      --default-storage-engine=InnoDB
      --innodb-autoinc-lock-mode=2
      --innodb-buffer-pool-size=1G
      --max-connections=500
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - galera-3-data:/var/lib/mysql
    networks:
      nac-data:
        ipv4_address: 172.30.2.12
    healthcheck: *healthcheck-db

  proxysql:
    image: proxysql/proxysql:2.6.3
    container_name: nac-proxysql
    hostname: proxysql
    volumes:
      - ./config/proxysql/proxysql.cnf:/etc/proxysql.cnf:ro
    ports:
      - "6033:6033"
      - "6032:6032"
    networks:
      nac-data:
        ipv4_address: 172.30.2.15
      nac-core:
    depends_on:
      mariadb-1:
        condition: service_healthy
    restart: unless-stopped

  #==========================================================================
  #  Redis (official image, master + 2 replicas + sentinel)
  #==========================================================================

  redis-1:
    image: redis:7.4-alpine
    container_name: nac-redis-1
    hostname: redis-1
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis_pwd} --maxmemory 1gb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis-1-data:/data
    networks:
      nac-data:
        ipv4_address: 172.30.2.20
      nac-core:
    healthcheck: *healthcheck-redis
    restart: unless-stopped

  redis-2:
    image: redis:7.4-alpine
    container_name: nac-redis-2
    hostname: redis-2
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis_pwd} --replicaof redis-1 6379 --masterauth ${REDIS_PASSWORD:-changeme_redis_pwd} --appendonly yes
    volumes:
      - redis-2-data:/data
    networks:
      nac-data:
        ipv4_address: 172.30.2.21
      nac-core:
    depends_on:
      redis-1:
        condition: service_healthy
    restart: unless-stopped

  redis-3:
    image: redis:7.4-alpine
    container_name: nac-redis-3
    hostname: redis-3
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis_pwd} --replicaof redis-1 6379 --masterauth ${REDIS_PASSWORD:-changeme_redis_pwd} --appendonly yes
    volumes:
      - redis-3-data:/data
    networks:
      nac-data:
        ipv4_address: 172.30.2.22
      nac-core:
    depends_on:
      redis-1:
        condition: service_healthy
    restart: unless-stopped

  redis-sentinel:
    image: redis:7.4-alpine
    container_name: nac-redis-sentinel
    hostname: redis-sentinel
    entrypoint: []
    command: >
      sh -c '
        mkdir -p /tmp/sentinel &&
        echo "port 26379" > /tmp/sentinel/sentinel.conf &&
        echo "sentinel monitor nac-master redis-1 6379 2" >> /tmp/sentinel/sentinel.conf &&
        echo "sentinel auth-pass nac-master ${REDIS_PASSWORD:-changeme_redis_pwd}" >> /tmp/sentinel/sentinel.conf &&
        echo "sentinel down-after-milliseconds nac-master 5000" >> /tmp/sentinel/sentinel.conf &&
        echo "sentinel failover-timeout nac-master 10000" >> /tmp/sentinel/sentinel.conf &&
        redis-sentinel /tmp/sentinel/sentinel.conf
      '
    networks:
      nac-data:
      nac-core:
    depends_on:
      - redis-1
      - redis-2
      - redis-3
    restart: unless-stopped

  #==========================================================================
  #  Kafka + Zookeeper (bitnami:latest — verified working)
  #==========================================================================

  zookeeper:
    image: zookeeper:3.9
    container_name: nac-zookeeper
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "ruok,stat"
    volumes:
      - zookeeper-data:/data
    networks:
      nac-data:
        ipv4_address: 172.30.2.30
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.1
    container_name: nac-kafka
    hostname: kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "6"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_HEAP_OPTS: "-Xms512m -Xmx1g"
      CLUSTER_ID: "nac-kafka-cluster-001"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    networks:
      nac-data:
        ipv4_address: 172.30.2.31
      nac-core:
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:3.7.1
    container_name: nac-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      nac-data:
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating NAC Kafka topics..."
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic nac.auth.events --partitions 6 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic nac.endpoint.profiles --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic nac.posture.status --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic nac.session.state --partitions 6 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic nac.coa.requests --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic nac.syslog.radius --partitions 6 --replication-factor 1
        echo "Done."
    restart: "no"

  #==========================================================================
  #  FreeRADIUS (x2)
  #==========================================================================

  freeradius-1:
    image: freeradius/freeradius-server:3.2.6
    container_name: nac-freeradius-1
    hostname: freeradius-1
    volumes:
      - ./config/freeradius/radiusd.conf:/etc/raddb/radiusd.conf:ro
      - ./config/freeradius/sites-enabled:/etc/raddb/sites-enabled:ro
      - ./config/freeradius/mods-enabled:/etc/raddb/mods-enabled:ro
      - ./config/freeradius/policy.d:/etc/raddb/policy.d:ro
      - ./config/freeradius/certs:/etc/raddb/certs:ro
      - ./config/freeradius/clients.conf:/etc/raddb/clients.conf:ro
      - ./config/freeradius/proxy.conf:/etc/raddb/proxy.conf:ro
      - ./config/freeradius/huntgroups:/etc/raddb/huntgroups:ro
    environment:
      <<: *common-env
      RADIUS_NODE_ID: freeradius-1
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
      - "3799:3799/udp"
    networks:
      nac-core:
        ipv4_address: 172.30.0.10
      nac-data:
    cap_add:
      - NET_ADMIN
    depends_on:
      mariadb-1:
        condition: service_healthy
      redis-1:
        condition: service_healthy
    restart: unless-stopped

  freeradius-2:
    image: freeradius/freeradius-server:3.2.6
    container_name: nac-freeradius-2
    hostname: freeradius-2
    volumes:
      - ./config/freeradius/radiusd.conf:/etc/raddb/radiusd.conf:ro
      - ./config/freeradius/sites-enabled:/etc/raddb/sites-enabled:ro
      - ./config/freeradius/mods-enabled:/etc/raddb/mods-enabled:ro
      - ./config/freeradius/policy.d:/etc/raddb/policy.d:ro
      - ./config/freeradius/certs:/etc/raddb/certs:ro
      - ./config/freeradius/clients.conf:/etc/raddb/clients.conf:ro
      - ./config/freeradius/proxy.conf:/etc/raddb/proxy.conf:ro
      - ./config/freeradius/huntgroups:/etc/raddb/huntgroups:ro
    environment:
      <<: *common-env
      RADIUS_NODE_ID: freeradius-2
    ports:
      - "11812:1812/udp"
      - "11813:1813/udp"
      - "13799:3799/udp"
    networks:
      nac-core:
        ipv4_address: 172.30.0.11
      nac-data:
    cap_add:
      - NET_ADMIN
    depends_on:
      mariadb-1:
        condition: service_healthy
      redis-1:
        condition: service_healthy
    restart: unless-stopped

  #==========================================================================
  #  TACACS+
  #==========================================================================

  tacacs:
    image: lfkeitel/tacacs_plus:latest
    container_name: nac-tacacs
    hostname: tacacs
    volumes:
      - ./config/tacacs/tac_plus.cfg:/etc/tac_plus/tac_plus.cfg:ro
    ports:
      - "49:49/tcp"
    networks:
      nac-core:
        ipv4_address: 172.30.0.15
    restart: unless-stopped

  #==========================================================================
  #  Application services (build from source)
  #==========================================================================

  policy-engine:
    build: ./services/policy-engine
    container_name: nac-policy-engine
    hostname: policy-engine
    environment:
      <<: *common-env
      FINGERBANK_API_KEY: ${FINGERBANK_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8000:8000"
    networks:
      nac-core:
        ipv4_address: 172.30.0.20
      nac-data:
      nac-mgmt:
    depends_on:
      mariadb-1:
        condition: service_healthy
      redis-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  profiler:
    build: ./services/profiler
    container_name: nac-profiler
    hostname: profiler
    environment:
      <<: *common-env
      FINGERBANK_API_KEY: ${FINGERBANK_API_KEY:-}
      POLICY_ENGINE_URL: http://policy-engine:8000
    networks:
      nac-core:
        ipv4_address: 172.30.0.21
      nac-data:
    depends_on:
      - policy-engine
    restart: unless-stopped

  posture-engine:
    build: ./services/posture-engine
    container_name: nac-posture-engine
    hostname: posture-engine
    environment:
      <<: *common-env
    networks:
      nac-core:
        ipv4_address: 172.30.0.22
      nac-data:
    depends_on:
      - policy-engine
    restart: unless-stopped

  guest-portal:
    build: ./services/guest-portal
    container_name: nac-guest-portal
    hostname: guest-portal
    environment:
      <<: *common-env
    ports:
      - "8443:8443"
    networks:
      nac-core:
        ipv4_address: 172.30.0.30
      nac-data:
      nac-mgmt:
    depends_on:
      - policy-engine
    restart: unless-stopped

  admin-ui:
    build: ./services/admin-ui
    container_name: nac-admin-ui
    hostname: admin-ui
    environment:
      API_BASE_URL: http://policy-engine:8000
    ports:
      - "443:443"
    networks:
      nac-mgmt:
        ipv4_address: 172.30.1.10
      nac-core:
    depends_on:
      - policy-engine
    restart: unless-stopped

  #==========================================================================
  #  PKI
  #==========================================================================

  # EJBCA disabled — image not available via mirror
  # Uncomment when direct Docker Hub access is available
  # ejbca:
  #   image: keyfactor/ejbca-ce:8.3
  #   container_name: nac-ejbca
  #   hostname: ejbca
  #   environment:
  #     DATABASE_JDBC_URL: jdbc:mariadb://mariadb-1:3306/ejbca?characterEncoding=utf8
  #     DATABASE_USER: ${EJBCA_DB_USER:-ejbca}
  #     DATABASE_PASSWORD: ${EJBCA_DB_PASSWORD:-changeme_ejbca_pwd}
  #     TLS_SETUP_ENABLED: "simple"
  #   ports:
  #     - "8081:8080"
  #     - "8444:8443"
  #   volumes:
  #     - ejbca-data:/opt/keyfactor/ejbca/p12
  #   networks:
  #     nac-core:
  #       ipv4_address: 172.30.0.40
  #     nac-data:
  #   depends_on:
  #     mariadb-1:
  #       condition: service_healthy
  #   restart: unless-stopped

  #==========================================================================
  #  Monitoring: ELK + Prometheus + Grafana
  #==========================================================================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: nac-elasticsearch
    hostname: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      nac-data:
        ipv4_address: 172.30.2.40
      nac-mgmt:
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '(green|yellow)'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.0
    container_name: nac-logstash
    hostname: logstash
    environment:
      LS_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "5514:5514/udp"
      - "5044:5044"
    networks:
      nac-data:
      nac-core:
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: nac-kibana
    hostname: kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      nac-mgmt:
      nac-data:
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: nac-prometheus
    hostname: prometheus
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      nac-mgmt:
      nac-core:
      nac-data:
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: nac-grafana
    hostname: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme_grafana_pwd}
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      nac-mgmt:
        ipv4_address: 172.30.1.20
      nac-data:
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: nac-node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command: ['--path.procfs=/host/proc', '--path.sysfs=/host/sys', '--path.rootfs=/rootfs']
    networks:
      nac-mgmt:
    restart: unless-stopped
