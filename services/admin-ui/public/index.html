<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Open NAC — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',-apple-system,sans-serif;background:#f8f9fa;color:#111827}input,textarea,select,button{font-family:inherit;outline:none}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}tr:hover td{background:rgba(0,0,0,0.015)!important}button:hover{opacity:.88}.mono{font-family:'IBM Plex Mono',monospace;font-size:13px}.input{width:100%;padding:8px 12px;border-radius:6px;border:1px solid #e5e7eb;font-size:13px;background:#fff;color:#111827}.input:focus{border-color:#f48120}.textarea{resize:vertical;min-height:60px;font-family:'IBM Plex Mono',monospace}.label{display:block;font-size:12px;font-weight:500;color:#6b7280;margin-bottom:4px}.btn{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none}.btn-primary{background:#f48120;color:#fff}.btn-danger{background:#fef2f2;color:#dc2626}.btn-default{background:#fff;color:#111827;border:1px solid #e5e7eb}.btn-sm{padding:5px 12px;font-size:12px}.badge{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:4px;font-size:12px;font-weight:500}.badge-green{background:#f0fdf4;color:#15803d}.badge-green::before{content:'';width:6px;height:6px;border-radius:50%;background:#16a34a}.badge-red{background:#fef2f2;color:#b91c1c}.badge-red::before{content:'';width:6px;height:6px;border-radius:50%;background:#dc2626}.badge-blue{background:#eff6ff;color:#1d4ed8}.badge-blue::before{content:'';width:6px;height:6px;border-radius:50%;background:#2563eb}.badge-gray{background:#f3f4f6;color:#6b7280}.badge-gray::before{content:'';width:6px;height:6px;border-radius:50%;background:#9ca3af}.card{background:#fff;border-radius:8px;border:1px solid #e5e7eb;overflow:hidden}.card-header{padding:14px 20px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600}table{width:100%;border-collapse:collapse}th{padding:8px 16px;text-align:left;font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #e5e7eb}td{padding:9px 16px;font-size:13px;border-bottom:1px solid #f3f4f6}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding-top:50px;overflow-y:auto}.modal{background:#fff;border-radius:12px;width:600px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.15)}.modal-header{padding:16px 24px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;font-size:16px;font-weight:600}.modal-body{padding:24px}.field{margin-bottom:14px}.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}.toggle{width:36px;height:20px;border-radius:10px;position:relative;cursor:pointer}.toggle.on{background:#16a34a}.toggle.off{background:#d1d5db}.toggle::after{content:'';width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;box-shadow:0 1px 3px rgba(0,0,0,.2)}.toggle.on::after{left:18px}.toggle.off::after{left:2px}.empty{text-align:center;padding:40px;color:#9ca3af}.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}.alert-success{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}.alert-error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useCallback}=React;const API="/api/v1";
async function api(p,o={}){try{const r=await fetch(API+p,{headers:{"Content-Type":"application/json",...(o.headers||{})},...o});return await r.json()}catch(e){return{error:e.message}}}
function Modal({title,children,onClose,wide}){return<div className="overlay" onClick={onClose}><div className="modal" style={wide?{width:720}:{}} onClick={e=>e.stopPropagation()}><div className="modal-header"><span>{title}</span><span style={{cursor:"pointer",color:"#9ca3af",fontSize:22}} onClick={onClose}>×</span></div><div className="modal-body">{children}</div></div></div>}
function Alert({type,text,onDismiss}){if(!text)return null;return<div className={`alert alert-${type}`}><span>{text}</span><span onClick={onDismiss} style={{cursor:"pointer",fontWeight:600}}>×</span></div>}

function DashboardPage(){const[d,setD]=useState(null);useEffect(()=>{api("/dashboard/stats").then(setD)},[]);if(!d)return<div className="empty">Loading...</div>;const ep=d.endpoints||{},au=d.auth||{};return<div><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:24}}>{[["Endpoints",ep.total||0,"#2563eb"],["Compliant",ep.compliant||0,"#16a34a"],["Non-compliant",ep.non_compliant||0,"#dc2626"],["Reject %",(au.reject_rate||0)+"%","#ca8a04"]].map(([l,v,c])=><div key={l} className="card" style={{padding:20}}><div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>{l}</div><div style={{fontSize:28,fontWeight:700,color:c}}>{v}</div></div>)}</div><div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:20}}><div className="card"><div className="card-header">Recent authentications</div><table><thead><tr><th>Time</th><th>User</th><th>Result</th><th>MAC</th></tr></thead><tbody>{(d.recent_auth||[]).map((a,i)=><tr key={i}><td className="mono">{(a.time||"").slice(11,19)}</td><td>{a.username}</td><td><span className={`badge badge-${a.result==="Access-Accept"?"green":"red"}`}>{a.result==="Access-Accept"?"Accept":"Reject"}</span></td><td className="mono" style={{color:"#9ca3af"}}>{a.mac||"—"}</td></tr>)}</tbody></table></div><div className="card" style={{padding:20}}><div style={{fontWeight:600,marginBottom:16}}>Categories</div>{(d.categories||[]).map((c,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}><span>{c.category}</span><span className="mono" style={{color:"#6b7280"}}>{c.count}</span></div>)}</div></div></div>}

function EndpointsPage(){const[data,setData]=useState(null);const[search,setSearch]=useState("");const[detail,setDetail]=useState(null);const[msg,setMsg]=useState(null);const load=useCallback(()=>api(`/endpoints?search=${search}&limit=200`).then(setData),[search]);useEffect(()=>{load()},[load]);const sendCoa=async(mac,action)=>{const r=await api("/coa/send",{method:"POST",body:JSON.stringify({mac_address:mac,action})});setMsg({type:r?.success?"success":"error",text:r?.success?`${action} → ${mac}`:`Failed: ${r?.error||"?"}`});setTimeout(()=>setMsg(null),4000)};return<div><Alert type={msg?.type} text={msg?.text} onDismiss={()=>setMsg(null)}/><div style={{display:"flex",gap:12,marginBottom:16}}><input className="input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search MAC, IP, user, profile..." style={{flex:1}}/><button className="btn btn-default" onClick={load}>Refresh</button></div><div className="card">{!data?<div className="empty">Loading...</div>:<><table><thead><tr><th>MAC</th><th>IP</th><th>User</th><th>Profile</th><th>Posture</th><th>Last seen</th><th>Actions</th></tr></thead><tbody>{(data.items||[]).map((e,i)=><tr key={i} style={{cursor:"pointer"}} onClick={()=>setDetail(e)}><td className="mono">{e.mac_address}</td><td className="mono">{e.ip_address||"—"}</td><td>{e.username||"—"}</td><td>{e.device_profile||"Unknown"}</td><td><span className={`badge badge-${e.posture_status==="compliant"?"green":e.posture_status==="non_compliant"?"red":"gray"}`}>{e.posture_status||"unknown"}</span></td><td style={{color:"#9ca3af"}}>{e.last_seen?new Date(e.last_seen).toLocaleString():"—"}</td><td onClick={ev=>ev.stopPropagation()}><div style={{display:"flex",gap:4}}><button className="btn btn-default btn-sm" onClick={()=>sendCoa(e.mac_address,"reauthenticate")}>CoA</button><button className="btn btn-danger btn-sm" onClick={()=>sendCoa(e.mac_address,"disconnect")}>Disc</button></div></td></tr>)}</tbody></table><div style={{padding:"10px 16px",fontSize:12,color:"#9ca3af",borderTop:"1px solid #e5e7eb"}}>{data.total||0} endpoints</div></>}</div>{detail&&<Modal title="Endpoint details" onClose={()=>setDetail(null)} wide><div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>{Object.entries(detail).filter(([k])=>k!=="id").map(([k,v])=><div key={k} style={{display:"flex",padding:"8px 0",borderBottom:"1px solid #f3f4f6",fontSize:13}}><span style={{width:140,color:"#6b7280"}}>{k.replace(/_/g," ")}</span><span className={["mac","ip","nas","vlan"].some(x=>k.includes(x))?"mono":""}>{v!=null?String(v):"—"}</span></div>)}</div><div style={{display:"flex",gap:8,marginTop:16,paddingTop:16,borderTop:"1px solid #e5e7eb"}}><button className="btn btn-primary" onClick={()=>{sendCoa(detail.mac_address,"reauthenticate");setDetail(null)}}>Reauthenticate</button><button className="btn btn-default" onClick={()=>{sendCoa(detail.mac_address,"bounce-port");setDetail(null)}}>Port bounce</button><button className="btn btn-danger" onClick={()=>{sendCoa(detail.mac_address,"disconnect");setDetail(null)}}>Disconnect</button></div></Modal>}</div>}

function PoliciesPage(){const[data,setData]=useState(null);const[editing,setEditing]=useState(null);const[msg,setMsg]=useState(null);const ef={name:"",description:"",priority:100,policy_set:"Wired 802.1X",conditions:"{}",actions:'{"vlan":"100"}',enabled:true};const[form,setForm]=useState(ef);const load=()=>api("/policies").then(setData);useEffect(()=>{load()},[]);const openNew=()=>{setForm({...ef,conditions:JSON.stringify({"AD-Group":"Domain Users","Posture":"Compliant"},null,2),actions:JSON.stringify({vlan:"100",acl:"EMPLOYEE_FULL"},null,2)});setEditing("new")};const openEdit=p=>{setForm({...p,conditions:JSON.stringify(p.conditions,null,2),actions:JSON.stringify(p.actions,null,2)});setEditing(p.id)};const save=async()=>{try{const body={...form,conditions:JSON.parse(form.conditions),actions:JSON.parse(form.actions)};const r=editing==="new"?await api("/policies",{method:"POST",body:JSON.stringify(body)}):await api(`/policies/${editing}`,{method:"PUT",body:JSON.stringify(body)});setMsg({type:r?.error?"error":"success",text:r?.error||"Saved"});setEditing(null);load()}catch(e){setMsg({type:"error",text:"Invalid JSON"})}setTimeout(()=>setMsg(null),4000)};const del=async(id,name)=>{if(!confirm(`Delete "${name}"?`))return;await api(`/policies/${id}`,{method:"DELETE"});load()};const toggle=async p=>{await api(`/policies/${p.id}`,{method:"PUT",body:JSON.stringify({enabled:!p.enabled})});load()};return<div><Alert type={msg?.type} text={msg?.text} onDismiss={()=>setMsg(null)}/><div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><div style={{fontSize:13,color:"#6b7280"}}>{data?.total||0} rules · Evaluated by priority</div><button className="btn btn-primary" onClick={openNew}>+ Create rule</button></div><div className="card">{!data?<div className="empty">Loading...</div>:<table><thead><tr><th>Pri</th><th>Name</th><th>Set</th><th>Conditions</th><th>Result</th><th>Hits</th><th>On</th><th></th></tr></thead><tbody>{(data.items||[]).map((p,i)=><tr key={i}><td className="mono">{p.priority}</td><td style={{fontWeight:600}}>{p.name}{p.description&&<div style={{fontSize:11,color:"#9ca3af"}}>{p.description}</div>}</td><td><span className="badge badge-gray">{p.policy_set}</span></td><td className="mono" style={{color:"#6b7280",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis"}}>{JSON.stringify(p.conditions)}</td><td className="mono" style={{color:"#2563eb",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis"}}>{JSON.stringify(p.actions)}</td><td className="mono" style={{color:"#9ca3af"}}>{(p.hit_count||0).toLocaleString()}</td><td><div className={`toggle ${p.enabled?"on":"off"}`} onClick={()=>toggle(p)}/></td><td><div style={{display:"flex",gap:4}}><button className="btn btn-default btn-sm" onClick={()=>openEdit(p)}>Edit</button><button className="btn btn-danger btn-sm" onClick={()=>del(p.id,p.name)}>Del</button></div></td></tr>)}</tbody></table>}</div>{editing&&<Modal title={editing==="new"?"Create rule":`Edit: ${form.name}`} onClose={()=>setEditing(null)} wide><div className="field"><label className="label">Rule name</label><input className="input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div><div className="field"><label className="label">Description</label><input className="input" value={form.description||""} onChange={e=>setForm({...form,description:e.target.value})}/></div><div className="field-row"><div><label className="label">Priority</label><input className="input" type="number" value={form.priority} onChange={e=>setForm({...form,priority:+e.target.value})}/></div><div><label className="label">Policy set</label><select className="input" value={form.policy_set} onChange={e=>setForm({...form,policy_set:e.target.value})}>{["Wired 802.1X","Wireless","MAB Wired","CWA Portal","VPN","Default"].map(s=><option key={s}>{s}</option>)}</select></div></div><div className="field"><label className="label">Conditions (JSON)</label><textarea className="input textarea" value={form.conditions} onChange={e=>setForm({...form,conditions:e.target.value})} rows={4}/><div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>Keys: AD-Group, Posture, Device-Profile, Device-Category, Auth-Method, EAP-Type, NAS-IP, Site, Certificate, Department</div><div style={{display:"flex",gap:4,marginTop:6,flexWrap:"wrap"}}>{[['Domain Users','{"AD-Group":"Domain Users"}'],['Compliant','{"AD-Group":"Domain Users","Posture":"Compliant"}'],['IP Phone','{"Device-Profile":"IP Phone*"}'],['Unknown','{"Device-Profile":"Unknown"}']].map(([l,v])=><button key={l} className="btn btn-default btn-sm" onClick={()=>setForm({...form,conditions:v})}>{l}</button>)}</div></div><div className="field"><label className="label">Result (JSON)</label><textarea className="input textarea" value={form.actions} onChange={e=>setForm({...form,actions:e.target.value})} rows={3} style={{color:"#2563eb"}}/><div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>Actions: vlan, acl, url_redirect, url_redirect_acl, session_timeout, deny</div><div style={{display:"flex",gap:4,marginTop:6,flexWrap:"wrap"}}>{[['VLAN 100','{"vlan":"100"}'],['Quarantine','{"vlan":"999","url_redirect":"https://portal.nac.local/remediation"}'],['Deny','{"deny":true}'],['VoIP','{"vlan":"50","acl":"QOS-VOICE"}']].map(([l,v])=><button key={l} className="btn btn-default btn-sm" onClick={()=>setForm({...form,actions:v})}>{l}</button>)}</div></div><div style={{display:"flex",gap:8,marginTop:16,paddingTop:16,borderTop:"1px solid #e5e7eb"}}><button className="btn btn-primary" onClick={save}>{editing==="new"?"Create":"Save"}</button><button className="btn btn-default" onClick={()=>setEditing(null)}>Cancel</button>{editing!=="new"&&<><div style={{flex:1}}/><button className="btn btn-danger" onClick={()=>{del(editing,form.name);setEditing(null)}}>Delete</button></>}</div></Modal>}</div>}

function AuthLogPage(){const[data,setData]=useState(null);const[search,setSearch]=useState("");const[filter,setFilter]=useState("");const load=useCallback(()=>api(`/auth-log?search=${search}&result=${filter}&limit=200`).then(setData),[search,filter]);useEffect(()=>{load()},[load]);return<div><div style={{display:"flex",gap:12,marginBottom:16}}><input className="input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search user, MAC, NAS..." style={{flex:1}}/><select className="input" value={filter} onChange={e=>setFilter(e.target.value)} style={{width:160}}><option value="">All</option><option value="Access-Accept">Accept</option><option value="Access-Reject">Reject</option></select><button className="btn btn-default" onClick={load}>Refresh</button></div><div className="card">{!data?<div className="empty">Loading...</div>:<><table><thead><tr><th>Timestamp</th><th>User</th><th>Result</th><th>MAC</th><th>NAS</th></tr></thead><tbody>{(data.items||[]).map((a,i)=><tr key={i} style={{background:a.result==="Access-Reject"?"rgba(220,38,38,0.03)":"transparent"}}><td className="mono">{(a.timestamp||"").replace("T"," ").slice(0,19)}</td><td>{a.username}</td><td><span className={`badge badge-${a.result==="Access-Accept"?"green":"red"}`}>{a.result==="Access-Accept"?"Accept":"Reject"}</span></td><td className="mono">{a.mac||"—"}</td><td className="mono" style={{color:"#9ca3af"}}>{a.nas_ip||"—"}</td></tr>)}</tbody></table><div style={{padding:"10px 16px",fontSize:12,color:"#9ca3af",borderTop:"1px solid #e5e7eb"}}>{data.total||0} entries</div></>}</div></div>}

function NASPage(){const[data,setData]=useState(null);const[editing,setEditing]=useState(null);const[form,setForm]=useState({nasname:"",shortname:"",type:"cisco",secret:"",description:""});const[msg,setMsg]=useState(null);const load=()=>api("/network-devices").then(setData);useEffect(()=>{load()},[]);const save=async()=>{if(!form.nasname||!form.secret){setMsg({type:"error",text:"IP and secret required"});return}await api("/network-devices",{method:"POST",body:JSON.stringify(form)});setMsg({type:"success",text:`${form.nasname} added`});setEditing(null);setForm({nasname:"",shortname:"",type:"cisco",secret:"",description:""});load();setTimeout(()=>setMsg(null),4000)};const del=async(id,name)=>{if(!confirm(`Remove ${name}?`))return;await api(`/network-devices/${id}`,{method:"DELETE"});load()};return<div><Alert type={msg?.type} text={msg?.text} onDismiss={()=>setMsg(null)}/><div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><div style={{fontSize:13,color:"#6b7280"}}>{data?.total||0} devices</div><button className="btn btn-primary" onClick={()=>setEditing("new")}>+ Add device</button></div><div className="card">{!data?<div className="empty">Loading...</div>:<table><thead><tr><th>IP/Subnet</th><th>Hostname</th><th>Vendor</th><th>Secret</th><th>Description</th><th></th></tr></thead><tbody>{(data.items||[]).map((d,i)=><tr key={i}><td className="mono">{d.nasname}</td><td style={{fontWeight:500}}>{d.shortname}</td><td><span className="badge badge-gray">{d.type}</span></td><td className="mono">{d.secret}</td><td style={{color:"#9ca3af"}}>{d.description||"—"}</td><td><button className="btn btn-danger btn-sm" onClick={()=>del(d.id,d.shortname||d.nasname)}>Remove</button></td></tr>)}</tbody></table>}</div>{editing&&<Modal title="Add network device" onClose={()=>setEditing(null)}><div className="field"><label className="label">IP address or subnet</label><input className="input mono" value={form.nasname} onChange={e=>setForm({...form,nasname:e.target.value})} placeholder="10.0.1.1"/></div><div className="field"><label className="label">Hostname</label><input className="input" value={form.shortname} onChange={e=>setForm({...form,shortname:e.target.value})} placeholder="hq-sw1"/></div><div className="field-row"><div><label className="label">Vendor</label><select className="input" value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>{["cisco","juniper","aruba","hpe","other"].map(t=><option key={t}>{t}</option>)}</select></div><div><label className="label">RADIUS secret</label><input className="input mono" type="password" value={form.secret} onChange={e=>setForm({...form,secret:e.target.value})}/></div></div><div className="field"><label className="label">Description</label><input className="input" value={form.description} onChange={e=>setForm({...form,description:e.target.value})}/></div><div style={{display:"flex",gap:8,marginTop:16}}><button className="btn btn-primary" onClick={save}>Add</button><button className="btn btn-default" onClick={()=>setEditing(null)}>Cancel</button></div></Modal>}</div>}

function GuestPage(){const[data,setData]=useState(null);const[creating,setCreating]=useState(false);const[form,setForm]=useState({email:"",phone:"",sponsor:"",company:"",duration_hours:24,max_devices:3});const[creds,setCreds]=useState(null);const load=()=>api("/guest-accounts").then(setData);useEffect(()=>{load()},[]);const create=async()=>{const r=await api("/guest-accounts",{method:"POST",body:JSON.stringify(form)});if(r?.username){setCreds(r);load();setCreating(false)}};const del=async id=>{if(confirm("Delete?")){await api(`/guest-accounts/${id}`,{method:"DELETE"});load()}};return<div>{creds&&<div className="alert alert-success"><div><b>Created:</b> <span className="mono">{creds.username}</span> / <span className="mono">{creds.password}</span> · Valid: {creds.valid_until}</div><span onClick={()=>setCreds(null)} style={{cursor:"pointer",fontWeight:600}}>×</span></div>}<div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><div style={{fontSize:13,color:"#6b7280"}}>{data?.total||0} accounts</div><button className="btn btn-primary" onClick={()=>setCreating(true)}>+ Create guest</button></div><div className="card">{!data?<div className="empty">Loading...</div>:<table><thead><tr><th>Username</th><th>Email</th><th>Sponsor</th><th>Company</th><th>Status</th><th>Valid until</th><th></th></tr></thead><tbody>{(data.items||[]).map((g,i)=><tr key={i}><td className="mono">{g.username}</td><td>{g.email||"—"}</td><td>{g.sponsor||"—"}</td><td>{g.company||"—"}</td><td><span className={`badge badge-${g.status==="active"?"green":"gray"}`}>{g.status}</span></td><td style={{color:"#9ca3af"}}>{g.valid_until?new Date(g.valid_until).toLocaleString():"—"}</td><td><button className="btn btn-danger btn-sm" onClick={()=>del(g.id)}>Del</button></td></tr>)}</tbody></table>}</div>{creating&&<Modal title="Create guest" onClose={()=>setCreating(false)}><div className="field-row"><div><label className="label">Email</label><input className="input" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/></div><div><label className="label">Phone</label><input className="input" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/></div></div><div className="field-row"><div><label className="label">Sponsor</label><input className="input" value={form.sponsor} onChange={e=>setForm({...form,sponsor:e.target.value})}/></div><div><label className="label">Company</label><input className="input" value={form.company} onChange={e=>setForm({...form,company:e.target.value})}/></div></div><div className="field-row"><div><label className="label">Duration (hours)</label><input className="input" type="number" value={form.duration_hours} onChange={e=>setForm({...form,duration_hours:+e.target.value})}/></div><div><label className="label">Max devices</label><input className="input" type="number" value={form.max_devices} onChange={e=>setForm({...form,max_devices:+e.target.value})}/></div></div><div style={{display:"flex",gap:8,marginTop:16}}><button className="btn btn-primary" onClick={create}>Create</button><button className="btn btn-default" onClick={()=>setCreating(false)}>Cancel</button></div></Modal>}</div>}

function LDAPPage(){const[cfg,setCfg]=useState({server:"dc1.corp.local",port:636,use_ssl:true,bind_dn:"CN=svc-radius,OU=Service Accounts,DC=corp,DC=local",bind_password:"",base_dn:"DC=corp,DC=local",user_filter:"(sAMAccountName=%{Stripped-User-Name})",group_attribute:"memberOf",mappings:[{ad_group:"Domain Admins",nac_group:"admins",vlan:"10"},{ad_group:"Domain Users",nac_group:"employees",vlan:"100"},{ad_group:"Contractors",nac_group:"contractors",vlan:"200"}]});const[testing,setTesting]=useState(false);const[result,setResult]=useState(null);const[msg,setMsg]=useState(null);const addMap=()=>setCfg({...cfg,mappings:[...cfg.mappings,{ad_group:"",nac_group:"",vlan:""}]});const delMap=i=>setCfg({...cfg,mappings:cfg.mappings.filter((_,j)=>j!==i)});const updMap=(i,k,v)=>{const m=[...cfg.mappings];m[i]={...m[i],[k]:v};setCfg({...cfg,mappings:m})};const test=async()=>{setTesting(true);setResult(null);await new Promise(r=>setTimeout(r,2000));setTesting(false);setResult({ok:false,msg:`Cannot connect to ${cfg.server}:${cfg.port} — configure a real AD server`})};const save=()=>{setMsg({type:"success",text:"LDAP config saved"});setTimeout(()=>setMsg(null),4000)};return<div><Alert type={msg?.type} text={msg?.text} onDismiss={()=>setMsg(null)}/><div className="card" style={{marginBottom:20}}><div className="card-header">Connection settings</div><div style={{padding:20}}><div className="field-row"><div><label className="label">LDAP server</label><input className="input mono" value={cfg.server} onChange={e=>setCfg({...cfg,server:e.target.value})}/></div><div className="field-row" style={{marginBottom:0}}><div><label className="label">Port</label><input className="input mono" type="number" value={cfg.port} onChange={e=>setCfg({...cfg,port:+e.target.value})}/></div><div><label className="label">SSL</label><div className={`toggle ${cfg.use_ssl?"on":"off"}`} style={{marginTop:8}} onClick={()=>setCfg({...cfg,use_ssl:!cfg.use_ssl})}/></div></div></div><div className="field"><label className="label">Bind DN</label><input className="input mono" value={cfg.bind_dn} onChange={e=>setCfg({...cfg,bind_dn:e.target.value})}/></div><div className="field"><label className="label">Bind password</label><input className="input mono" type="password" value={cfg.bind_password} onChange={e=>setCfg({...cfg,bind_password:e.target.value})}/></div><div className="field"><label className="label">Base DN</label><input className="input mono" value={cfg.base_dn} onChange={e=>setCfg({...cfg,base_dn:e.target.value})}/></div><div style={{display:"flex",gap:8,marginTop:12}}><button className="btn btn-default" onClick={test} disabled={testing}>{testing?"Testing...":"Test connection"}</button></div>{result&&<div className={`alert alert-${result.ok?"success":"error"}`} style={{marginTop:12}}>{result.msg}</div>}</div></div><div className="card" style={{marginBottom:20}}><div className="card-header">Search settings</div><div style={{padding:20}}><div className="field"><label className="label">User filter</label><input className="input mono" value={cfg.user_filter} onChange={e=>setCfg({...cfg,user_filter:e.target.value})}/><div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>%{'{Stripped-User-Name}'} = login username</div></div><div className="field"><label className="label">Group membership attribute</label><input className="input mono" value={cfg.group_attribute} onChange={e=>setCfg({...cfg,group_attribute:e.target.value})}/></div></div></div><div className="card" style={{marginBottom:20}}><div className="card-header"><span>AD Group → VLAN mapping</span><button className="btn btn-default btn-sm" onClick={addMap}>+ Add</button></div><table><thead><tr><th>AD Group (CN)</th><th>NAC Group</th><th>VLAN</th><th></th></tr></thead><tbody>{cfg.mappings.map((m,i)=><tr key={i}><td><input className="input mono" value={m.ad_group} onChange={e=>updMap(i,"ad_group",e.target.value)} style={{border:"none",padding:"2px 0"}}/></td><td><input className="input" value={m.nac_group} onChange={e=>updMap(i,"nac_group",e.target.value)} style={{border:"none",padding:"2px 0"}}/></td><td><input className="input mono" value={m.vlan} onChange={e=>updMap(i,"vlan",e.target.value)} style={{border:"none",padding:"2px 0",width:80}}/></td><td><button className="btn btn-danger btn-sm" onClick={()=>delMap(i)}>×</button></td></tr>)}</tbody></table></div><div style={{display:"flex",gap:8}}><button className="btn btn-primary" onClick={save}>Save configuration</button><button className="btn btn-default">Reset</button></div></div>}

function SettingsPage(){return<div className="card" style={{padding:20}}><div style={{fontWeight:600,marginBottom:16}}>System information</div>{[["Version","0.1.0"],["MariaDB","Galera 3/3"],["Redis","Sentinel HA"],["Kafka","KRaft mode"],["FreeRADIUS","3.2.6 ×2"]].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f3f4f6",fontSize:13}}><span style={{color:"#6b7280"}}>{k}</span><span className="mono">{v}</span></div>)}</div>}

const NAV=[{id:"dashboard",name:"Overview",icon:"◎"},{section:"Access Control"},{id:"endpoints",name:"Endpoints",icon:"◉"},{id:"policies",name:"Policies",icon:"⚙"},{id:"authlog",name:"Auth Log",icon:"▤"},{id:"guests",name:"Guest Portal",icon:"⊕"},{section:"Infrastructure"},{id:"nas",name:"Network Devices",icon:"⬡"},{id:"ldap",name:"LDAP / AD",icon:"⊞"},{section:"System"},{id:"settings",name:"Settings",icon:"◇"}];
const PG={dashboard:{t:"Overview",s:"NAC Dashboard",C:DashboardPage},endpoints:{t:"Endpoints",s:"Authenticated devices",C:EndpointsPage},policies:{t:"Authorization Policies",s:"Rules determining access levels",C:PoliciesPage},authlog:{t:"Authentication Log",s:"RADIUS events",C:AuthLogPage},nas:{t:"Network Devices",s:"Switches, WLCs, VPN gateways",C:NASPage},guests:{t:"Guest Accounts",s:"Temporary access",C:GuestPage},ldap:{t:"LDAP / Active Directory",s:"Identity source and group mapping",C:LDAPPage},settings:{t:"Settings",s:"System configuration",C:SettingsPage}};

function App(){const[page,setPage]=useState("dashboard");const[health,setHealth]=useState(null);useEffect(()=>{const f=()=>fetch("/health").then(r=>r.json()).then(setHealth).catch(()=>setHealth({status:"error"}));f();const t=setInterval(f,30000);return()=>clearInterval(t)},[]);const pg=PG[page]||PG.dashboard;const C=pg.C;return<div style={{display:"flex",height:"100vh"}}><nav style={{width:230,background:"#1a1a2e",display:"flex",flexDirection:"column",flexShrink:0}}><div style={{padding:"20px 18px 16px",borderBottom:"1px solid rgba(255,255,255,0.08)"}}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#f48120,#e85d04)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:16,color:"#fff"}}>N</div><div><div style={{fontSize:16,fontWeight:700,color:"#fff"}}>Open NAC</div><div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>Network Access Control</div></div></div></div><div style={{padding:"12px 8px",flex:1,overflowY:"auto"}}>{NAV.map((item,i)=>item.section?<div key={i} style={{padding:"14px 12px 6px",fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.25)",textTransform:"uppercase",letterSpacing:1.2}}>{item.section}</div>:<div key={item.id} onClick={()=>setPage(item.id)} style={{padding:"8px 12px",borderRadius:6,cursor:"pointer",fontSize:13,marginBottom:1,color:page===item.id?"#fff":"rgba(255,255,255,0.45)",fontWeight:page===item.id?600:400,background:page===item.id?"#2d2d55":"transparent",display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:16,width:22,textAlign:"center"}}>{item.icon}</span><span>{item.name}</span></div>)}</div><div style={{padding:"14px 16px",borderTop:"1px solid rgba(255,255,255,0.08)",fontSize:12}}><div style={{display:"flex",alignItems:"center",gap:6,color:health?.status==="ok"?"#4ade80":"#f87171",marginBottom:4}}><span style={{width:6,height:6,borderRadius:"50%",background:"currentColor"}}/>{health?.status==="ok"?"All systems operational":"Connecting..."}</div><div style={{color:"rgba(255,255,255,0.2)",fontSize:11}}>v0.1.0 · Galera 3/3</div></div></nav><main style={{flex:1,overflow:"auto"}}><div style={{borderBottom:"1px solid #e5e7eb",background:"#fff",padding:"20px 32px"}}><h1 style={{fontSize:20,fontWeight:700,margin:0}}>{pg.t}</h1><p style={{fontSize:13,color:"#6b7280",margin:"4px 0 0"}}>{pg.s}</p></div><div style={{padding:"24px 32px"}}><C/></div></main></div>}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
