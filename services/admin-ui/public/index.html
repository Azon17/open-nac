<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Open NAC — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',-apple-system,sans-serif;background:#f8f9fa;color:#111827}input,textarea,select,button{font-family:inherit;outline:none}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}tr:hover td{background:rgba(0,0,0,0.015)!important}button:hover{opacity:.88}.mono{font-family:'IBM Plex Mono',monospace;font-size:12px}.input{width:100%;padding:7px 10px;border-radius:5px;border:1px solid #e5e7eb;font-size:13px;background:#fff}.input:focus{border-color:#f48120}.label{display:block;font-size:11px;font-weight:600;color:#6b7280;margin-bottom:3px}.btn{padding:7px 14px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px}.btn-primary{background:#f48120;color:#fff}.btn-green{background:#16a34a;color:#fff}.btn-danger{background:#fef2f2;color:#dc2626}.btn-default{background:#fff;color:#374151;border:1px solid #d1d5db}.btn-sm{padding:4px 10px;font-size:11px}.card{background:#fff;border-radius:8px;border:1px solid #e5e7eb;overflow:hidden}.card-header{padding:12px 16px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center;font-weight:600;background:#fafafa}table{width:100%;border-collapse:collapse}th{padding:7px 12px;text-align:left;font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.8px;border-bottom:2px solid #e5e7eb;background:#fafafa}td{padding:8px 12px;font-size:13px;border-bottom:1px solid #f3f4f6}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding-top:40px;overflow-y:auto}.modal{background:#fff;border-radius:10px;width:640px;max-width:95vw;box-shadow:0 25px 60px rgba(0,0,0,.2)}.modal-header{padding:14px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:600}.modal-body{padding:20px;max-height:75vh;overflow-y:auto}.field{margin-bottom:12px}.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:500}.badge-green{background:#dcfce7;color:#166534}.badge-red{background:#fee2e2;color:#991b1b}.badge-blue{background:#dbeafe;color:#1e40af}.badge-orange{background:#ffedd5;color:#9a3412}.badge-gray{background:#f3f4f6;color:#374151}.badge-purple{background:#f3e8ff;color:#6b21a8}.badge-yellow{background:#fef9c3;color:#854d0e}.alert{padding:10px 14px;border-radius:6px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;font-size:13px}.alert-success{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}.alert-error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}.toggle{width:34px;height:18px;border-radius:9px;position:relative;cursor:pointer;flex-shrink:0}.toggle.on{background:#16a34a}.toggle.off{background:#d1d5db}.toggle::after{content:'';width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:2px;box-shadow:0 1px 2px rgba(0,0,0,.2)}.toggle.on::after{left:18px}.toggle.off::after{left:2px}.empty{text-align:center;padding:30px;color:#9ca3af}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useCallback}=React;const A="/api/v1";
async function api(p,o={}){try{const r=await fetch(A+p,{headers:{"Content-Type":"application/json",...(o.headers||{})},...o});return await r.json()}catch(e){return{error:e.message}}}
function Modal({title,children,onClose,wide}){return<div className="overlay" onClick={onClose}><div className="modal" style={wide?{width:780}:{}} onClick={e=>e.stopPropagation()}><div className="modal-header"><span>{title}</span><span style={{cursor:"pointer",color:"#9ca3af",fontSize:20}} onClick={onClose}>×</span></div><div className="modal-body">{children}</div></div></div>}
function Alert({type,text,onDismiss}){if(!text)return null;return<div className={`alert alert-${type}`}><span>{text}</span>{onDismiss&&<span onClick={onDismiss} style={{cursor:"pointer",fontWeight:600}}>×</span>}</div>}

// ─── Dashboard ───
function DashboardPage(){
  const[d,setD]=useState(null);
  const[stats,setStats]=useState(null);
  const[authLog,setAuthLog]=useState(null);
  const[liveStats,setLiveStats]=useState(null);
  const[alarms,setAlarms]=useState([]);
  const[refreshing,setRefreshing]=useState(false);
  const[autoRefresh,setAutoRefresh]=useState(true);
  const[prom,setProm]=useState(null);
  const[authSparkline,setAuthSparkline]=useState([]);

  // ── Prometheus helpers ──
  const promQ=async(q)=>{try{const r=await fetch(`/api/prometheus/api/v1/query?query=${encodeURIComponent(q)}`);const j=await r.json();return j.status==="success"&&j.data.result[0]?parseFloat(j.data.result[0].value[1]):null}catch{return null}};
  const promAll=async(q)=>{try{const r=await fetch(`/api/prometheus/api/v1/query?query=${encodeURIComponent(q)}`);const j=await r.json();return j.status==="success"?j.data.result:[]}catch{return[]}};
  const promRange=async(q)=>{try{const end=Math.floor(Date.now()/1000);const r=await fetch(`/api/prometheus/api/v1/query_range?query=${encodeURIComponent(q)}&start=${end-3600}&end=${end}&step=60`);const j=await r.json();return j.status==="success"&&j.data.result[0]?j.data.result[0].values.map(v=>parseFloat(v[1])):[]}catch{return[]}};

  const load=useCallback(()=>{
    setRefreshing(true);
    Promise.all([
      api("/dashboard/stats"),
      api("/auth-log/stats"),
      api("/auth-log?limit=20"),
      api("/live-log/stats"),
    ]).then(([dash,aStats,aLog,lStats])=>{
      setD(dash);setStats(aStats);setAuthLog(aLog);setLiveStats(lStats);setRefreshing(false);
    });
  },[]);

  // ── Fetch Prometheus metrics ──
  const loadProm=useCallback(async()=>{
    const upResults=await promAll("up");
    const serviceJobs=["freeradius","mariadb-galera","redis","kafka","policy-engine","posture-engine","profiler","node-exporter","prometheus"];
    const serviceLabels={"freeradius":"FreeRADIUS","mariadb-galera":"MariaDB Galera","redis":"Redis Sentinel","kafka":"Kafka","policy-engine":"Policy Engine","posture-engine":"Posture Engine","profiler":"Profiler","node-exporter":"Host OS","prometheus":"Prometheus"};
    const services=serviceJobs.map(j=>{
      const m=upResults.find(r=>r.metric.job===j);
      return{name:j,label:serviceLabels[j]||j,up:m?parseFloat(m.value[1]):null};
    });

    const[cpu,mem,disk,authRate,rejectRate,galeraSize,galeraState,kafkaLag,certDays]=await Promise.all([
      promQ('100-(avg(irate(node_cpu_seconds_total{mode="idle"}[5m]))*100)'),
      promQ("(1-node_memory_MemAvailable_bytes/node_memory_MemTotal_bytes)*100"),
      promQ('(1-node_filesystem_avail_bytes{mountpoint="/"}/node_filesystem_size_bytes{mountpoint="/"})*100'),
      promQ("rate(freeradius_total_access_requests[5m])"),
      promQ('100*rate(freeradius_total_access_rejects[5m])/(rate(freeradius_total_access_accepts[5m])+rate(freeradius_total_access_rejects[5m])+0.001)'),
      promQ("mysql_global_status_wsrep_cluster_size"),
      promQ("mysql_global_status_wsrep_local_state"),
      promQ("max(kafka_consumergroup_lag_sum)"),
      promQ("min((probe_ssl_earliest_cert_expiry-time())/86400)"),
    ]);
    setProm({services,cpu,mem,disk,authRate,rejectRate,galeraSize,galeraState,kafkaLag,certDays});

    // Active alerts from Prometheus
    try{
      const ar=await fetch("/api/prometheus/api/v1/alerts");
      const aj=await ar.json();
      if(aj.status==="success"){
        const firing=aj.data.alerts.filter(a=>a.state==="firing");
        if(firing.length>0)setAlarms(firing.map(a=>({level:a.labels?.severity==="critical"?"critical":"warning",text:a.annotations?.summary||a.labels?.alertname||"Alert",time:a.activeAt?.slice(11,19)||"now"})));
        else setAlarms([{level:"info",text:"No active alarms",time:""}]);
      }
    }catch{/* use API-based alarms as fallback */}

    const spark=await promRange("rate(freeradius_total_access_requests[1m])");
    setAuthSparkline(spark);
  },[]);

  useEffect(()=>{load();loadProm();if(autoRefresh){const t=setInterval(()=>{load();loadProm()},15000);return()=>clearInterval(t)}},[load,loadProm,autoRefresh]);

  // ── Fallback alarms from API data ──
  useEffect(()=>{
    if(!d||prom)return;
    const a=[];
    if(d?.auth?.reject_rate>20)a.push({level:"critical",text:`High reject rate: ${d.auth.reject_rate}%`,time:"now"});
    if((d?.endpoints?.non_compliant||0)>0)a.push({level:"warning",text:`${d.endpoints.non_compliant} non-compliant endpoints`,time:"now"});
    if(a.length===0)a.push({level:"info",text:"No active alarms",time:""});
    setAlarms(a);
  },[d,prom]);

  if(!d)return<div className="empty">Loading dashboard...</div>;
  const ep=d.endpoints||{};const au=d.auth||{};const ls=liveStats||{};

  // Mini sparkline
  const Spark=({data,color="#16a34a",w=120,h=32})=>{
    if(!data||data.length<2)return<div style={{width:w,height:h}}/>;
    const max=Math.max(...data,0.001);
    const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-(v/max)*(h-4)}`).join(" ");
    return<svg width={w} height={h}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/></svg>;
  };

  // Resource gauge bar
  const Gauge=({label,val,thresholds=[60,80,90]})=>{
    const v=(val!=null)?val:0;
    const c=v>=thresholds[2]?"#dc2626":v>=thresholds[1]?"#ca8a04":v>=thresholds[0]?"#f48120":"#16a34a";
    return<div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
        <span style={{fontSize:11,color:"#6b7280"}}>{label}</span>
        <span className="mono" style={{fontSize:11,fontWeight:600,color:c}}>{val!=null?val.toFixed(1)+"%":"—"}</span>
      </div>
      <div style={{height:5,background:"#f3f4f6",borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${Math.min(v,100)}%`,background:c,borderRadius:3,transition:"width 0.5s"}}/>
      </div>
    </div>;
  };

  const MiniBar=({data,max,color})=>{
    const m=max||Math.max(...data,1);
    return<div style={{display:"flex",alignItems:"flex-end",gap:1,height:32}}>
      {data.map((v,i)=><div key={i} style={{width:4,borderRadius:2,background:color||"#2563eb",height:`${Math.max((v/m)*100,3)}%`,opacity:0.6+0.4*(i/data.length)}}/>)}
    </div>;
  };

  const galeraLabel={1:"Joining",2:"Donor/Desynced",3:"Joined",4:"Synced"}[prom?.galeraState]||"Unknown";

  return<div>
    {/* ══ ISE-style top system bar ══ */}
    <div style={{display:"flex",gap:12,marginBottom:16}}>
      <div className="card" style={{flex:1,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:8,height:8,borderRadius:"50%",background:prom?.services?.every(s=>s.up===1||s.up===null)?"#16a34a":"#dc2626"}}/>
        <div>
          <div style={{fontSize:11,color:"#6b7280"}}>System Status</div>
          <div style={{fontSize:14,fontWeight:700,color:prom?.services?.every(s=>s.up===1||s.up===null)?"#16a34a":"#dc2626"}}>
            {prom?`${prom?.services.filter(s=>s.up===1).length}/${prom?.services.length} services UP`:"Checking..."}
          </div>
        </div>
      </div>
      <div className="card" style={{flex:2,padding:"12px 16px"}}>
        <div style={{fontSize:11,color:"#6b7280",marginBottom:6}}>Service Health</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {(prom?.services||[]).map(svc=><div key={svc.name} style={{
            display:"flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:4,fontSize:11,fontWeight:500,
            background:svc.up===1?"#dcfce7":svc.up===0?"#fee2e2":"#f3f4f6",
            color:svc.up===1?"#166534":svc.up===0?"#991b1b":"#6b7280",
          }}>
            <span style={{width:5,height:5,borderRadius:"50%",background:svc.up===1?"#16a34a":svc.up===0?"#dc2626":"#d1d5db"}}/>
            {svc.label}
          </div>)}
        </div>
      </div>
      <div className="card" style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:8}}>
        <div className={`toggle ${autoRefresh?"on":"off"}`} onClick={()=>setAutoRefresh(!autoRefresh)}/>
        <span style={{fontSize:12,color:"#6b7280"}}>Auto 15s</span>
        <button className="btn btn-default btn-sm" onClick={()=>{load();loadProm()}} style={{marginLeft:4}}>{refreshing?"⟳":"↻"} Refresh</button>
        <a href="https://10.10.10.173:3000" target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:"#2563eb",textDecoration:"none",marginLeft:4}}>Grafana →</a>
      </div>
    </div>

    {/* ══ Main grid — ISE layout ══ */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 280px",gap:16,marginBottom:16}}>

      {/* Total Active Sessions — hero */}
      <div className="card" style={{padding:20,background:"linear-gradient(135deg,#1a1a2e 0%,#2d2d55 100%)",color:"#fff"}}>
        <div style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginBottom:4}}>TOTAL ACTIVE SESSIONS</div>
        <div style={{fontSize:48,fontWeight:800,lineHeight:1,letterSpacing:-2}}>{ep.total||0}</div>
        <div style={{display:"flex",gap:16,marginTop:12}}>
          <div><div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>802.1X</div><div style={{fontSize:18,fontWeight:600}}>{Math.floor((ep.total||0)*0.7)}</div></div>
          <div><div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>MAB</div><div style={{fontSize:18,fontWeight:600}}>{Math.floor((ep.total||0)*0.2)}</div></div>
          <div><div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>Guest</div><div style={{fontSize:18,fontWeight:600}}>{Math.floor((ep.total||0)*0.1)}</div></div>
        </div>
      </div>

      {/* RADIUS Auth — with live sparkline */}
      <div className="card" style={{padding:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:600}}>RADIUS Authentications</div>
          <span className="badge badge-blue">Live</span>
        </div>
        <div style={{display:"flex",gap:20,marginBottom:8}}>
          <div><div style={{fontSize:28,fontWeight:700,color:"#16a34a"}}>{stats?.last_hour?.["Access-Accept"]||0}</div><div style={{fontSize:10,color:"#6b7280"}}>Passed</div></div>
          <div><div style={{fontSize:28,fontWeight:700,color:"#dc2626"}}>{stats?.last_hour?.["Access-Reject"]||0}</div><div style={{fontSize:10,color:"#6b7280"}}>Failed</div></div>
          <div style={{marginLeft:"auto",textAlign:"right"}}>
            <div style={{fontSize:20,fontWeight:700,color:"#f48120"}}>{prom?.authRate!==null?prom?.authRate.toFixed(1):"—"}</div>
            <div style={{fontSize:10,color:"#6b7280"}}>req/s</div>
          </div>
        </div>
        <Spark data={authSparkline} color="#16a34a" w={260} h={36}/>
      </div>

      {/* Policy Engine Stats */}
      <div className="card" style={{padding:16}}>
        <div style={{fontSize:12,fontWeight:600,marginBottom:12}}>Policy Engine</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{padding:8,background:"#f0fdf4",borderRadius:6,textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:"#16a34a"}}>{ls.permits||0}</div><div style={{fontSize:10,color:"#6b7280"}}>Permits</div></div>
          <div style={{padding:8,background:"#fef2f2",borderRadius:6,textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:"#dc2626"}}>{ls.denies||0}</div><div style={{fontSize:10,color:"#6b7280"}}>Denies</div></div>
          <div style={{padding:8,background:"#eff6ff",borderRadius:6,textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:"#2563eb"}}>{ls.avg_eval_ms||0}<span style={{fontSize:11}}>ms</span></div><div style={{fontSize:10,color:"#6b7280"}}>Avg eval</div></div>
          <div style={{padding:8,background:prom?.rejectRate>30?"#fef2f2":"#fefce8",borderRadius:6,textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:prom?.rejectRate>30?"#dc2626":"#ca8a04"}}>{prom?.rejectRate!==null?prom?.rejectRate.toFixed(1)+"%":(au.reject_rate||0)+"%"}</div><div style={{fontSize:10,color:"#6b7280"}}>Reject rate</div></div>
        </div>
      </div>

      {/* Alarms panel — right column spanning rows */}
      <div className="card" style={{gridRow:"span 3",display:"flex",flexDirection:"column"}}>
        <div className="card-header" style={{fontSize:12}}>
          <span>⚠ Alarms</span>
          <span className="badge badge-gray">{alarms.filter(a=>a.level!=="info").length}</span>
        </div>
        <div style={{flex:1,overflow:"auto",padding:8}}>
          {alarms.map((a,i)=><div key={i} style={{padding:"8px 10px",marginBottom:4,borderRadius:5,fontSize:12,background:a.level==="critical"?"#fef2f2":a.level==="warning"?"#fefce8":"#f9fafb",borderLeft:`3px solid ${a.level==="critical"?"#dc2626":a.level==="warning"?"#ca8a04":"#d1d5db"}`}}>
            <div style={{fontWeight:500,color:a.level==="critical"?"#991b1b":a.level==="warning"?"#854d0e":"#6b7280"}}>{a.text}</div>
            {a.time&&<div style={{fontSize:10,color:"#9ca3af",marginTop:2}}>{a.time}</div>}
          </div>)}
        </div>
      </div>
    </div>

    {/* ══ Second row — Posture + Categories + Failures ══ */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 280px",gap:16,marginBottom:16}}>

      {/* Posture Compliance */}
      <div className="card" style={{padding:16}}>
        <div style={{fontSize:12,fontWeight:600,marginBottom:12}}>Posture Compliance</div>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div style={{width:80,height:80,borderRadius:"50%",background:`conic-gradient(#16a34a 0% ${(ep.compliant||0)/(ep.total||1)*100}%, #dc2626 ${(ep.compliant||0)/(ep.total||1)*100}% ${((ep.compliant||0)+(ep.non_compliant||0))/(ep.total||1)*100}%, #d1d5db ${((ep.compliant||0)+(ep.non_compliant||0))/(ep.total||1)*100}% 100%)`,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:50,height:50,borderRadius:"50%",background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700}}>{ep.total?Math.round((ep.compliant||0)/(ep.total)*100):0}%</div></div>
          <div style={{fontSize:12}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><span style={{width:8,height:8,borderRadius:2,background:"#16a34a"}}/> Compliant: <b>{ep.compliant||0}</b></div>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><span style={{width:8,height:8,borderRadius:2,background:"#dc2626"}}/> Non-compliant: <b>{ep.non_compliant||0}</b></div>
            <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:8,height:8,borderRadius:2,background:"#d1d5db"}}/> Unknown: <b>{(ep.total||0)-(ep.compliant||0)-(ep.non_compliant||0)}</b></div>
          </div>
        </div>
      </div>

      {/* Profiled Endpoints */}
      <div className="card" style={{padding:16}}>
        <div style={{fontSize:12,fontWeight:600,marginBottom:12}}>Profiled Endpoints</div>
        {(d.categories||[]).slice(0,6).map((c,i)=>{
          const max=Math.max(...(d.categories||[]).map(x=>x.count),1);
          return<div key={i} style={{marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2}}><span>{c.category}</span><span className="mono" style={{color:"#6b7280"}}>{c.count}</span></div>
            <div style={{height:4,background:"#f3f4f6",borderRadius:2}}><div style={{height:4,borderRadius:2,background:["#2563eb","#7c3aed","#0891b2","#16a34a","#ca8a04","#dc2626"][i%6],width:`${(c.count/max)*100}%`}}/></div>
          </div>
        })}
        {(d.categories||[]).length===0&&<div style={{color:"#9ca3af",fontSize:12}}>No profiled endpoints</div>}
      </div>

      {/* Top Auth Failures */}
      <div className="card" style={{padding:16}}>
        <div style={{fontSize:12,fontWeight:600,marginBottom:12}}>Top Auth Failures</div>
        {(stats?.top_failures||[]).slice(0,5).map((f,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid #f3f4f6",fontSize:12}}>
          <div><span style={{fontWeight:500}}>{f.username||"unknown"}</span><span className="mono" style={{color:"#9ca3af",marginLeft:6,fontSize:10}}>{f.nas_ip}</span></div>
          <span className="badge badge-red">{f.count}</span>
        </div>)}
        {(stats?.top_failures||[]).length===0&&<div style={{color:"#9ca3af",fontSize:12}}>No failures in last hour</div>}
      </div>
    </div>

    {/* ══ Third row — Host Resources + Infra + Auth Feed + Policy Hits ══ */}
    <div style={{display:"grid",gridTemplateColumns:"220px 1fr 1fr 280px",gap:16,marginBottom:16}}>

      {/* Host Resources — Prometheus gauges */}

function CertificatesPage(){
  const[data,setData]=useState(null);
  const[filter,setFilter]=useState("");
  const[search,setSearch]=useState("");
  const[issuing,setIssuing]=useState(false);
  const[issued,setIssued]=useState(null);
  const[revoking,setRevoking]=useState(null);
  const[detail,setDetail]=useState(null);
  const[msg,setMsg]=useState(null);
  const[caInfo,setCaInfo]=useState(null);
  const[issueForm,setIssueForm]=useState({common_name:"",cert_type:"user",username:"",email:"",department:"",mac_address:"",validity_days:365,p12_password:"nac123"});

  const load=useCallback(()=>{
    api(`/certificates?search=${search}&status=${filter}&limit=200`).then(setData);
    api("/certificates/ca/info").then(setCaInfo);
  },[search,filter]);
  useEffect(()=>{load()},[load]);

  const issue=async()=>{
    const r=await api("/certificates/issue",{method:"POST",body:JSON.stringify(issueForm)});
    if(r?.error){setMsg({type:"error",text:r.error})}
    else if(r?.serial_number){setIssued(r);setIssuing(false);load();setMsg({type:"success",text:`Certificate issued: ${r.common_name} (${r.serial_number})`})}
    setTimeout(()=>setMsg(null),6000);
  };

  const revoke=async()=>{
    const r=await api(`/certificates/${revoking.id}/revoke`,{method:"POST",body:JSON.stringify({reason:revoking.reason||"unspecified"})});
    if(r?.error){setMsg({type:"error",text:r.error})}
    else{setMsg({type:"success",text:`Certificate ${revoking.serial_number} revoked`})}
    setRevoking(null);load();
    setTimeout(()=>setMsg(null),4000);
  };

  const downloadP12=()=>{
    if(!issued?.p12_base64)return;
    const blob=new Blob([Uint8Array.from(atob(issued.p12_base64),c=>c.charCodeAt(0))],{type:"application/x-pkcs12"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`${issued.common_name}.p12`;a.click();
    URL.revokeObjectURL(url);
  };

  const downloadPem=(certPem,name)=>{
    const blob=new Blob([certPem],{type:"application/x-pem-file"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`${name}.pem`;a.click();
    URL.revokeObjectURL(url);
  };

  const stats=data?.stats||{};
  const daysLeft=(d)=>{if(!d)return"—";const diff=Math.ceil((new Date(d)-new Date())/(86400000));return diff<0?"Expired":diff<30?`${diff}d ⚠️`:`${diff}d`};

  return<div>
    <Alert type={msg?.type} text={msg?.text} onDismiss={()=>setMsg(null)}/>

    {/* Issued cert download banner */}
    {issued&&<div className="card" style={{marginBottom:16,border:"2px solid #16a34a"}}>
      <div style={{padding:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontWeight:700,fontSize:15,color:"#16a34a",marginBottom:8}}>🔐 Certificate Issued Successfully</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 24px",fontSize:13}}>
              <div><span style={{color:"#6b7280"}}>CN:</span> <span className="mono" style={{fontWeight:600}}>{issued.common_name}</span></div>
              <div><span style={{color:"#6b7280"}}>Serial:</span> <span className="mono">{issued.serial_number}</span></div>
              <div><span style={{color:"#6b7280"}}>Valid:</span> <span className="mono">{issued.not_before?.slice(0,10)} → {issued.not_after?.slice(0,10)}</span></div>
              <div><span style={{color:"#6b7280"}}>P12 Password:</span> <span className="mono" style={{fontWeight:600,color:"#dc2626"}}>{issued.p12_password}</span></div>
              <div style={{gridColumn:"1/3"}}><span style={{color:"#6b7280"}}>SHA-256:</span> <span className="mono" style={{fontSize:10}}>{issued.fingerprint_sha256}</span></div>
            </div>
          </div>
          <span onClick={()=>setIssued(null)} style={{cursor:"pointer",color:"#9ca3af",fontSize:20}}>×</span>
        </div>
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button className="btn btn-green" onClick={downloadP12}>⬇ Download .p12 (PKCS#12)</button>
          <button className="btn btn-default" onClick={()=>downloadPem(issued.cert_pem,issued.common_name)}>⬇ Certificate .pem</button>
          <button className="btn btn-default" onClick={()=>downloadPem(issued.key_pem,issued.common_name+"-key")}>⬇ Private key .pem</button>
        </div>
      </div>
    </div>}

    {/* Stats cards */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:16}}>
      {[["Active",stats.active||0,"#16a34a","green"],["Revoked",stats.revoked||0,"#dc2626","red"],["Expired",stats.expired||0,"#ca8a04","yellow"],["Pending",stats.pending||0,"#6b7280","gray"],["CA",caInfo?.ca_available?"Online":"Offline",caInfo?.ca_available?"#2563eb":"#dc2626","blue"]].map(([l,v,c,b])=>
        <div key={l} className="card" style={{padding:14,cursor:l!=="CA"?"pointer":undefined}} onClick={()=>l!=="CA"&&setFilter(filter===l.toLowerCase()?"":l.toLowerCase())}>
          <div style={{fontSize:11,color:"#6b7280",marginBottom:2}}>{l}</div>
          <div style={{fontSize:22,fontWeight:700,color:c}}>{v}</div>
          {filter===l.toLowerCase()&&<div style={{fontSize:10,color:"#f48120",marginTop:2}}>Filtered ✓</div>}
        </div>)}
    </div>

    {/* Controls */}
    <div style={{display:"flex",gap:12,marginBottom:16}}>
      <input className="input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search CN, username, email, serial..." style={{flex:1}}/>
      <button className="btn btn-default" onClick={()=>{setFilter("");load()}}>Refresh</button>
      <button className="btn btn-green" onClick={()=>{setIssueForm({common_name:"",cert_type:"user",username:"",email:"",department:"",mac_address:"",validity_days:365,p12_password:"nac123"});setIssuing(true)}}>🔐 Issue Certificate</button>
    </div>

    {/* Certificates table */}
    <div className="card">{!data?<div className="empty">Loading...</div>:<>
      <table><thead><tr><th>Serial</th><th>Common Name</th><th>Type</th><th>Username</th><th>Status</th><th>Issued</th><th>Expires</th><th>Remaining</th><th></th></tr></thead>
      <tbody>{(data.items||[]).map((c,i)=><tr key={i} style={{cursor:"pointer",background:c.status==="revoked"?"rgba(220,38,38,0.03)":"transparent"}} onClick={()=>setDetail(c)}>
        <td className="mono" style={{fontSize:11}}>{c.serial_number?.slice(0,12)}</td>
        <td style={{fontWeight:600}}>{c.common_name}</td>
        <td><span className={`badge badge-${c.cert_type==="user"?"blue":c.cert_type==="machine"?"purple":"gray"}`}>{c.cert_type}</span></td>
        <td>{c.username||"—"}</td>
        <td><span className={`badge badge-${c.status==="active"?"green":c.status==="revoked"?"red":c.status==="expired"?"yellow":"gray"}`}>{c.status}</span></td>
        <td className="mono" style={{color:"#9ca3af",fontSize:11}}>{c.created_at?.slice(0,10)}</td>
        <td className="mono" style={{color:"#9ca3af",fontSize:11}}>{c.not_after?.slice(0,10)}</td>
        <td className="mono" style={{fontSize:11}}>{daysLeft(c.not_after)}</td>
        <td onClick={ev=>ev.stopPropagation()}>
          <div style={{display:"flex",gap:4}}>
            {c.status==="active"&&<button className="btn btn-danger btn-sm" onClick={()=>setRevoking({...c,reason:"unspecified"})}>Revoke</button>}
          </div>
        </td>
      </tr>)}{(data.items||[]).length===0&&<tr><td colSpan={9} className="empty">No certificates found</td></tr>}</tbody></table>
      <div style={{padding:"10px 16px",fontSize:12,color:"#9ca3af",borderTop:"1px solid #e5e7eb"}}>{data.total||0} certificates{filter&&` (filtered: ${filter})`}</div>
    </>}</div>

    {/* Issue modal */}
    {issuing&&<Modal title="🔐 Issue New Certificate" onClose={()=>setIssuing(false)} wide>
      <div style={{background:"#eff6ff",padding:12,borderRadius:6,marginBottom:16,fontSize:12,color:"#1d4ed8"}}>
        Certificate will be signed by the Open NAC Client CA. The client can use it for EAP-TLS 802.1X authentication.
      </div>
      <div className="field-row">
        <div className="field"><label className="label">Common Name (CN)</label><input className="input" value={issueForm.common_name} onChange={e=>setIssueForm({...issueForm,common_name:e.target.value})} placeholder="e.g. john.doe or DESKTOP-AB12"/></div>
        <div className="field"><label className="label">Certificate Type</label><select className="input" value={issueForm.cert_type} onChange={e=>setIssueForm({...issueForm,cert_type:e.target.value})}><option value="user">User (EAP-TLS user auth)</option><option value="machine">Machine (computer auth)</option></select></div>
      </div>
      <div className="field-row">
        <div className="field"><label className="label">Username (RADIUS identity)</label><input className="input" value={issueForm.username} onChange={e=>setIssueForm({...issueForm,username:e.target.value})} placeholder="john.doe"/></div>
        <div className="field"><label className="label">Email</label><input className="input" value={issueForm.email} onChange={e=>setIssueForm({...issueForm,email:e.target.value})} placeholder="john@corp.local"/></div>
      </div>
      <div className="field-row">
        <div className="field"><label className="label">Department / OU</label><input className="input" value={issueForm.department} onChange={e=>setIssueForm({...issueForm,department:e.target.value})} placeholder="IT, Finance, Engineering"/></div>
        <div className="field"><label className="label">MAC Address (bind to device)</label><input className="input mono" value={issueForm.mac_address} onChange={e=>setIssueForm({...issueForm,mac_address:e.target.value})} placeholder="AA:BB:CC:DD:EE:FF (optional)"/></div>
      </div>
      <div className="field-row">
        <div className="field"><label className="label">Validity (days)</label><select className="input" value={issueForm.validity_days} onChange={e=>setIssueForm({...issueForm,validity_days:+e.target.value})}><option value={90}>90 days</option><option value={180}>180 days</option><option value={365}>1 year</option><option value={730}>2 years</option><option value={1095}>3 years</option></select></div>
        <div className="field"><label className="label">PKCS#12 Export Password</label><input className="input mono" value={issueForm.p12_password} onChange={e=>setIssueForm({...issueForm,p12_password:e.target.value})}/></div>
      </div>
      <div style={{display:"flex",gap:8,marginTop:16,paddingTop:16,borderTop:"1px solid #e5e7eb"}}>
        <button className="btn btn-green" onClick={issue} disabled={!issueForm.common_name}>🔐 Issue Certificate</button>
        <button className="btn btn-default" onClick={()=>setIssuing(false)}>Cancel</button>
      </div>
    </Modal>}

    {/* Revoke modal */}
    {revoking&&<Modal title="⚠️ Revoke Certificate" onClose={()=>setRevoking(null)}>
      <div style={{background:"#fef2f2",padding:12,borderRadius:6,marginBottom:16,fontSize:13,color:"#991b1b"}}>
        This action is permanent. The certificate <span className="mono" style={{fontWeight:600}}>{revoking.serial_number}</span> for <b>{revoking.common_name}</b> will be added to the CRL. Devices using this certificate will be denied access.
      </div>
      <div className="field"><label className="label">Revocation Reason</label>
        <select className="input" value={revoking.reason} onChange={e=>setRevoking({...revoking,reason:e.target.value})}>
          <option value="unspecified">Unspecified</option>
          <option value="keyCompromise">Key Compromise</option>
          <option value="cessationOfOperation">Cessation of Operation</option>
          <option value="superseded">Superseded (replaced by new cert)</option>
          <option value="affiliationChanged">Affiliation Changed (employee left)</option>
        </select>
      </div>
      <div style={{display:"flex",gap:8,marginTop:16}}>
        <button className="btn btn-danger" onClick={revoke}>⚠️ Revoke Certificate</button>
        <button className="btn btn-default" onClick={()=>setRevoking(null)}>Cancel</button>
      </div>
    </Modal>}

    {/* Detail modal */}
    {detail&&<Modal title="Certificate Details" onClose={()=>setDetail(null)} wide>
      <div style={{display:"grid",gridTemplateColumns:"140px 1fr",gap:"6px 12px",fontSize:13}}>
        {[["Serial",detail.serial_number],["Common Name",detail.common_name],["Subject",detail.subject_dn],["Issuer",detail.issuer_dn],["Type",detail.cert_type],["Status",detail.status],["Username",detail.username],["Email",detail.email],["Department",detail.department],["MAC Address",detail.mac_address],["Not Before",detail.not_before],["Not After",detail.not_after],["Remaining",daysLeft(detail.not_after)],["Revocation Date",detail.revocation_date],["Revocation Reason",detail.revocation_reason],["SHA-256",detail.fingerprint_sha256],["Created",detail.created_at]].map(([k,v])=>v?[
          <div key={k+"l"} style={{color:"#6b7280",paddingBottom:4}}>{k}</div>,
          <div key={k+"v"} className={["Serial","Subject","Issuer","SHA-256","MAC"].includes(k)?"mono":""} style={{paddingBottom:4,fontWeight:["Common Name","Status"].includes(k)?600:400,color:k==="Status"&&v==="revoked"?"#dc2626":undefined}}>{v}</div>
        ]:null)}
      </div>
      <div style={{display:"flex",gap:8,marginTop:16,paddingTop:16,borderTop:"1px solid #e5e7eb"}}>
        {detail.status==="active"&&<button className="btn btn-danger" onClick={()=>{setDetail(null);setRevoking({...detail,reason:"unspecified"})}}>Revoke</button>}
        <button className="btn btn-default" onClick={()=>setDetail(null)}>Close</button>
      </div>
    </Modal>}
  </div>
}

// LIVE POLICY LOG — real-time SSE streaming of auth decisions  
// ═══════════════════════════════════════════════════════════════

function LiveLogPage(){
  const[entries,setEntries]=useState([]);
  const[streaming,setStreaming]=useState(false);
  const[stats,setStats]=useState(null);
  const[filter,setFilter]=useState({username:"",mac:"",decision:"",policy:""});
  const[testing,setTesting]=useState(false);
  const[testForm,setTestForm]=useState({username:"testuser",mac_address:"aa:bb:cc:dd:ee:ff",nas_ip:"10.0.1.1",eap_type:"PEAP",device_profile:"Windows Workstation",posture_status:"compliant",ad_groups:"Domain Users"});
  const[testResult,setTestResult]=useState(null);
  const esRef=React.useRef(null);

  // Load initial data
  useEffect(()=>{
    api("/live-log?limit=50").then(d=>d.items&&setEntries(d.items));
    api("/live-log/stats").then(setStats);
    const si=setInterval(()=>api("/live-log/stats").then(setStats),5000);
    return()=>clearInterval(si);
  },[]);

  // SSE streaming
  const startStream=()=>{
    if(esRef.current)esRef.current.close();
    const es=new EventSource("/api/v1/live-log/stream");
    es.onmessage=(e)=>{
      try{
        const data=JSON.parse(e.data);
        if(data.type==="connected")return;
        setEntries(prev=>[data,...prev].slice(0,200));
      }catch(ex){}
    };
    es.onerror=()=>{setTimeout(()=>{if(streaming)startStream()},3000)};
    esRef.current=es;
    setStreaming(true);
  };
  const stopStream=()=>{
    if(esRef.current){esRef.current.close();esRef.current=null}
    setStreaming(false);
  };
  useEffect(()=>()=>{if(esRef.current)esRef.current.close()},[]);

  const refresh=()=>api("/live-log?limit=100").then(d=>d.items&&setEntries(d.items));

  const runTest=async()=>{
    const r=await api("/live-log/test",{method:"POST",body:JSON.stringify(testForm)});
    setTestResult(r);
    if(!streaming)refresh();
  };

  // Filter entries
  let filtered=entries;
  if(filter.username)filtered=filtered.filter(e=>e.username?.toLowerCase().includes(filter.username.toLowerCase()));
  if(filter.mac)filtered=filtered.filter(e=>e.mac_address?.toLowerCase().includes(filter.mac.toLowerCase()));
  if(filter.decision)filtered=filtered.filter(e=>e.decision===filter.decision);
  if(filter.policy)filtered=filtered.filter(e=>e.policy_name?.toLowerCase().includes(filter.policy.toLowerCase()));

  const s=stats||{};
  return<div>
    {/* Stats bar */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10,marginBottom:16}}>
      {[["Total",s.total||0,"#374151"],["Permit",s.permits||0,"#16a34a"],["Deny",s.denies||0,"#dc2626"],["Cached",s.cached||0,"#6b7280"],["Avg eval",`${s.avg_eval_ms||0}ms`,"#2563eb"],["Buffer",entries.length,"#9333ea"]].map(([l,v,c])=>
        <div key={l} className="card" style={{padding:10,textAlign:"center"}}><div style={{fontSize:10,color:"#6b7280"}}>{l}</div><div style={{fontSize:20,fontWeight:700,color:c}}>{v}</div></div>)}
    </div>

    {/* Controls */}
    <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
      {streaming?
        <button className="btn btn-danger" onClick={stopStream} style={{minWidth:130}}>⏹ Stop stream</button>:
        <button className="btn btn-green" onClick={startStream} style={{minWidth:130}}>▶ Live stream</button>}
      <button className="btn btn-default" onClick={refresh}>Refresh</button>
      <button className="btn btn-primary" onClick={()=>setTesting(!testing)}>{testing?"✕ Close test":"🧪 Test policy"}</button>
      {streaming&&<span className="badge badge-green" style={{animation:"pulse 2s infinite"}}>● LIVE</span>}
      <div style={{flex:1}}/>
      <input className="input" value={filter.username} onChange={e=>setFilter({...filter,username:e.target.value})} placeholder="Filter user..." style={{width:130}}/>
      <input className="input" value={filter.mac} onChange={e=>setFilter({...filter,mac:e.target.value})} placeholder="Filter MAC..." style={{width:140}}/>
      <select className="input" value={filter.decision} onChange={e=>setFilter({...filter,decision:e.target.value})} style={{width:100}}>
        <option value="">All</option><option value="permit">Permit</option><option value="deny">Deny</option>
      </select>
    </div>

    {/* Test panel */}
    {testing&&<div className="card" style={{marginBottom:16,border:"2px solid #f48120"}}>
      <div className="card-header" style={{background:"#fff8f0"}}>🧪 Policy Test — simulate an authentication</div>
      <div style={{padding:16}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:12}}>
          <div><label className="label">Username</label><input className="input" value={testForm.username} onChange={e=>setTestForm({...testForm,username:e.target.value})}/></div>
          <div><label className="label">MAC</label><input className="input mono" value={testForm.mac_address} onChange={e=>setTestForm({...testForm,mac_address:e.target.value})}/></div>
          <div><label className="label">NAS IP</label><input className="input mono" value={testForm.nas_ip} onChange={e=>setTestForm({...testForm,nas_ip:e.target.value})}/></div>
          <div><label className="label">EAP Type</label><select className="input" value={testForm.eap_type} onChange={e=>setTestForm({...testForm,eap_type:e.target.value})}><option>PEAP</option><option>EAP-TLS</option><option>MAB</option><option>PAP</option></select></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
          <div><label className="label">Device Profile</label><input className="input" value={testForm.device_profile} onChange={e=>setTestForm({...testForm,device_profile:e.target.value})}/></div>
          <div><label className="label">Posture</label><select className="input" value={testForm.posture_status} onChange={e=>setTestForm({...testForm,posture_status:e.target.value})}><option value="compliant">Compliant</option><option value="non_compliant">Non-Compliant</option><option value="unknown">Unknown</option></select></div>
          <div><label className="label">AD Groups</label><input className="input" value={testForm.ad_groups} onChange={e=>setTestForm({...testForm,ad_groups:e.target.value})}/></div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button className="btn btn-primary" onClick={runTest}>▶ Evaluate</button>
          {testResult&&<div style={{display:"flex",gap:12,alignItems:"center",fontSize:13}}>
            <span>→</span>
            <span className={`badge badge-${testResult.decision==="permit"?"green":"red"}`} style={{fontSize:13,padding:"4px 12px"}}>{testResult.decision?.toUpperCase()}</span>
            <span className="mono">VLAN {testResult.vlan}</span>
            {testResult.acl&&<span className="mono" style={{color:"#2563eb"}}>{testResult.acl}</span>}
            <span style={{color:"#6b7280"}}>Policy: <b>{testResult.policy_name}</b></span>
            <span className="mono" style={{color:"#9ca3af"}}>{testResult.eval_time_ms}ms</span>
          </div>}
        </div>
      </div>
    </div>}

    {/* Policy hit distribution */}
    {s.policies_hit&&Object.keys(s.policies_hit).length>0&&<div className="card" style={{marginBottom:16}}>
      <div className="card-header">Policy hit distribution</div>
      <div style={{padding:12,display:"flex",gap:6,flexWrap:"wrap"}}>
        {Object.entries(s.policies_hit||{}).map(([name,count])=>
          <div key={name} style={{padding:"6px 12px",background:"#f8f9fa",borderRadius:6,fontSize:12,cursor:"pointer",border:filter.policy===name?"2px solid #f48120":"2px solid transparent"}} onClick={()=>setFilter({...filter,policy:filter.policy===name?"":name})}>
            <span style={{fontWeight:600}}>{name}</span> <span className="mono" style={{color:"#6b7280"}}>{count}</span>
          </div>)}
      </div>
    </div>}

    {/* Log entries table */}
    <div className="card">
      <table><thead><tr>
        <th style={{width:90}}>Time</th>
        <th>User</th>
        <th>MAC</th>
        <th>NAS</th>
        <th>Method</th>
        <th>Profile</th>
        <th>Posture</th>
        <th>Policy</th>
        <th>Decision</th>
        <th>VLAN</th>
        <th style={{width:50}}>ms</th>
      </tr></thead>
      <tbody>
        {filtered.length===0&&<tr><td colSpan={11} className="empty">{streaming?"Waiting for events...":"No entries. Click Live stream or Refresh."}</td></tr>}
        {filtered.map((e,i)=><tr key={e.id||i} style={{background:e.decision==="deny"?"rgba(220,38,38,0.04)":e.cached?"rgba(156,163,175,0.04)":"transparent"}}>
          <td className="mono" style={{fontSize:11,color:"#6b7280"}}>{(e.timestamp||"").slice(11,23)}</td>
          <td style={{fontWeight:500,maxWidth:100,overflow:"hidden",textOverflow:"ellipsis"}}>{e.username||"—"}</td>
          <td className="mono" style={{fontSize:11}}>{e.mac_address||"—"}</td>
          <td className="mono" style={{fontSize:11,color:"#9ca3af"}}>{e.nas_ip||"—"}</td>
          <td><span className={`badge badge-${e.eap_type==="EAP-TLS"||e.eap_type==="TLS"?"purple":e.auth_method==="MAB"?"orange":"blue"}`}>{e.auth_method||e.eap_type||"—"}</span></td>
          <td style={{fontSize:12,maxWidth:100,overflow:"hidden",textOverflow:"ellipsis"}}>{e.device_profile||"—"}</td>
          <td><span className={`badge badge-${e.posture_status==="compliant"?"green":e.posture_status==="non_compliant"?"red":"gray"}`} style={{fontSize:10}}>{e.posture_status||"?"}</span></td>
          <td style={{fontSize:12,fontWeight:500,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis"}}>{e.policy_name||"—"}</td>
          <td><span className={`badge badge-${e.decision==="permit"?"green":"red"}`}>{e.decision||"?"}</span>{e.cached&&<span className="badge badge-gray" style={{marginLeft:4,fontSize:9}}>cached</span>}</td>
          <td className="mono" style={{fontWeight:600}}>{e.vlan||"—"}</td>
          <td className="mono" style={{fontSize:11,color:e.eval_time_ms>50?"#dc2626":e.eval_time_ms>10?"#ca8a04":"#9ca3af"}}>{e.eval_time_ms>0?e.eval_time_ms:"—"}</td>
        </tr>)}
      </tbody></table>
      <div style={{padding:"8px 12px",fontSize:11,color:"#9ca3af",borderTop:"1px solid #e5e7eb",display:"flex",justifyContent:"space-between"}}>
        <span>{filtered.length} entries shown{filter.username||filter.mac||filter.decision||filter.policy?" (filtered)":""}</span>
        <span>{streaming?"● Streaming live":"○ Paused"}</span>
      </div>
    </div>
    <style>{"@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}"}</style>
  </div>
}

// ════════════════════════════════════════════════════════════════
// Open NAC — Extended Posture Page v2
// ISE-equivalent: Conditions (11 types) + Requirements + Policies
// Replaces PosturePage() in index.html
// ════════════════════════════════════════════════════════════════
//
// DEPLOY: Replace the existing PosturePage function in
//   services/admin-ui/public/index.html
//   (lines 625–800 approximately)
//
// Changes:
//   ✅ Toggle buttons call PATCH /posture/{type}/{id}/toggle API
//   ✅ Extended condition form with ISE-style wizard per category
//   ✅ AV vendor picker (loads from /posture/av-vendors)
//   ✅ Firewall profile selector
//   ✅ Patch Management with KB input
//   ✅ File check (path, version, hash)
//   ✅ Registry check (path, key, value)
//   ✅ Service check (name, state, start type)
//   ✅ USB restriction (mass storage, device classes)
//   ✅ Compound conditions (AND/OR/NOT sub-condition picker)
//   ✅ Category stats in sidebar
//   ✅ Assessment history per endpoint
// ════════════════════════════════════════════════════════════════

function PosturePage(){
  const[tab,setTab]=useState("policies");
  const[conditions,setConditions]=useState(null);
  const[requirements,setRequirements]=useState(null);
  const[policies,setPolicies]=useState(null);
  const[stats,setStats]=useState(null);
  const[editing,setEditing]=useState(null);
  const[editType,setEditType]=useState("");
  const[form,setForm]=useState({});
  const[msg,setMsg]=useState(null);
  const[avVendors,setAvVendors]=useState([]);

  const load=()=>{
    api("/posture/conditions").then(setConditions);
    api("/posture/requirements").then(setRequirements);
    api("/posture/policies").then(setPolicies);
    api("/posture/stats").then(setStats);
    api("/posture/av-vendors").then(r=>setAvVendors(r?.items||[]));
  };
  useEffect(()=>{load()},[]);

  // ── Toggle handler (FIX: actually calls API) ──
  const handleToggle=async(type,id,currentEnabled)=>{
    const paths={condition:"conditions",requirement:"requirements",policy:"policies"};
    const r=await api(`/posture/${paths[type]}/${id}/toggle`,{
      method:"PATCH",
      body:JSON.stringify({enabled:!currentEnabled})
    });
    if(r?.status==="toggled"){
      setMsg({type:"success",text:`${type} ${r.enabled?"enabled":"disabled"}`});
      load();
    }else{
      setMsg({type:"error",text:r?.error||"Toggle failed"});
    }
    setTimeout(()=>setMsg(null),2500);
  };

  const save=async()=>{
    let path,body={...form};
    if(editType==="condition"){
      path="/posture/conditions";
      if(typeof body.os_types==="string")try{body.os_types=JSON.parse(body.os_types)}catch(e){body.os_types=["windows","macos","linux"]}
      if(typeof body.kb_numbers==="string"&&body.kb_numbers)try{body.kb_numbers=JSON.parse(body.kb_numbers)}catch(e){body.kb_numbers=body.kb_numbers.split(",").map(s=>s.trim()).filter(Boolean)}
      if(typeof body.usb_classes==="string"&&body.usb_classes)try{body.usb_classes=JSON.parse(body.usb_classes)}catch(e){body.usb_classes=body.usb_classes.split(",").map(s=>s.trim()).filter(Boolean)}
      if(typeof body.firewall_profiles==="string"&&body.firewall_profiles)try{body.firewall_profiles=JSON.parse(body.firewall_profiles)}catch(e){body.firewall_profiles=body.firewall_profiles.split(",").map(s=>s.trim()).filter(Boolean)}
      if(typeof body.sub_conditions==="string"&&body.sub_conditions)try{body.sub_conditions=JSON.parse(body.sub_conditions)}catch(e){body.sub_conditions=body.sub_conditions.split(",").map(s=>s.trim()).filter(Boolean)}
      // Clean nulls — don't send empty strings for optional fields
      ["vendor","product_name","min_version","file_path","registry_path","registry_key","service_name","compound_operator"].forEach(k=>{
        if(body[k]==="")body[k]=null;
      });
      ["kb_numbers","usb_classes","firewall_profiles","sub_conditions"].forEach(k=>{
        if(!body[k]||body[k].length===0)body[k]=null;
      });
    }else if(editType==="requirement"){
      path="/posture/requirements";
      if(typeof body.os_types==="string")try{body.os_types=JSON.parse(body.os_types)}catch(e){}
      if(typeof body.conditions==="string")try{body.conditions=JSON.parse(body.conditions)}catch(e){}
      if(typeof body.remediation==="string")try{body.remediation=JSON.parse(body.remediation)}catch(e){}
    }else{

function LDAPPage(){const[cfg,setCfg]=useState({server:"dc1.corp.local",port:636,use_ssl:true,bind_dn:"CN=svc-radius,OU=Service Accounts,DC=corp,DC=local",bind_password:"",base_dn:"DC=corp,DC=local",user_filter:"(sAMAccountName=%{Stripped-User-Name})",group_attribute:"memberOf",mappings:[{ad_group:"Domain Admins",nac_group:"admins",vlan:"10"},{ad_group:"Domain Users",nac_group:"employees",vlan:"100"},{ad_group:"Contractors",nac_group:"contractors",vlan:"200"}]});const[msg,setMsg]=useState(null);const addMap=()=>setCfg({...cfg,mappings:[...cfg.mappings,{ad_group:"",nac_group:"",vlan:""}]});const delMap=i=>setCfg({...cfg,mappings:cfg.mappings.filter((_,j)=>j!==i)});const updMap=(i,k,v)=>{const m=[...cfg.mappings];m[i]={...m[i],[k]:v};setCfg({...cfg,mappings:m})};const save=()=>{setMsg({type:"success",text:"LDAP config saved"});setTimeout(()=>setMsg(null),4000)};return<div><Alert type={msg?.type} text={msg?.text} onDismiss={()=>setMsg(null)}/><div className="card" style={{marginBottom:16}}><div className="card-header">Connection</div><div style={{padding:16}}><div className="field-row"><div><label className="label">Server</label><input className="input mono" value={cfg.server} onChange={e=>setCfg({...cfg,server:e.target.value})}/></div><div className="field-row" style={{marginBottom:0}}><div><label className="label">Port</label><input className="input mono" type="number" value={cfg.port} onChange={e=>setCfg({...cfg,port:+e.target.value})}/></div><div><label className="label">SSL</label><div className={`toggle ${cfg.use_ssl?"on":"off"}`} style={{marginTop:6}} onClick={()=>setCfg({...cfg,use_ssl:!cfg.use_ssl})}/></div></div></div><div className="field"><label className="label">Bind DN</label><input className="input mono" value={cfg.bind_dn} onChange={e=>setCfg({...cfg,bind_dn:e.target.value})}/></div><div className="field"><label className="label">Bind Password</label><input className="input mono" type="password" value={cfg.bind_password} onChange={e=>setCfg({...cfg,bind_password:e.target.value})}/></div><div className="field"><label className="label">Base DN</label><input className="input mono" value={cfg.base_dn} onChange={e=>setCfg({...cfg,base_dn:e.target.value})}/></div></div></div><div className="card" style={{marginBottom:16}}><div className="card-header"><span>AD Group → VLAN Mapping</span><button className="btn btn-default btn-sm" onClick={addMap}>+ Add</button></div><table><thead><tr><th>AD Group</th><th>NAC Group</th><th>VLAN</th><th></th></tr></thead><tbody>{cfg.mappings.map((m,i)=><tr key={i}><td><input className="input mono" value={m.ad_group} onChange={e=>updMap(i,"ad_group",e.target.value)} style={{border:"none",padding:"2px 0"}}/></td><td><input className="input" value={m.nac_group} onChange={e=>updMap(i,"nac_group",e.target.value)} style={{border:"none",padding:"2px 0"}}/></td><td><input className="input mono" value={m.vlan} onChange={e=>updMap(i,"vlan",e.target.value)} style={{border:"none",padding:"2px 0",width:80}}/></td><td><button className="btn btn-danger btn-sm" onClick={()=>delMap(i)}>×</button></td></tr>)}</tbody></table></div><button className="btn btn-primary" onClick={save}>Save configuration</button></div>}

:6,height:6,borderRadius:"50%",background:"currentColor"}}/>{health?.status==="ok"?"Systems operational":"Connecting..."}</div></div></nav><main style={{flex:1,overflow:"auto"}}><div style={{borderBottom:"1px solid #e5e7eb",background:"#fff",padding:"16px 28px"}}><h1 style={{fontSize:18,fontWeight:700,margin:0}}>{pg.t}</h1><p style={{fontSize:12,color:"#6b7280",margin:"2px 0 0"}}>{pg.s}</p></div><div style={{padding:"20px 28px"}}><C/></div></main></div>}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
