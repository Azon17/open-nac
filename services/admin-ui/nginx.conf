server {
    listen 443;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy to policy-engine
    # Prometheus API proxy for dashboard metrics
    location /api/prometheus/ {
        proxy_pass http://prometheus:9090/;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }
    location /api/ {
        proxy_pass http://policy-engine:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Health endpoint proxy
    location /health {
        proxy_pass http://policy-engine:8000/health;
    }

    # Swagger docs proxy
    location /docs {
        proxy_pass http://policy-engine:8000/docs;
    }
    location /openapi.json {
        proxy_pass http://policy-engine:8000/openapi.json;
    }

    # Static files
    location / {
        try_files $uri $uri/ /index.html;
    }
}
