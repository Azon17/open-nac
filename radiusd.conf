###############################################################################
#  Open NAC — FreeRADIUS 3.2.x Main Configuration
#  Эквивалент: Cisco ISE Runtime (prrt-server)
#
#  Этот файл — ядро AAA. Все policy-решения принимаются здесь через:
#    1. unlang-правила (локальная логика)
#    2. SQL-запросы к MariaDB (данные пользователей/групп)
#    3. LDAP/AD-запросы (доменная аутентификация)
#    4. REST-вызовы к policy-engine (сложная логика, profiling, posture)
#    5. Redis (кэш сессий, session directory)
###############################################################################

prefix = /usr
exec_prefix = /usr
sysconfdir = /etc
localstatedir = /var
sbindir = ${exec_prefix}/sbin
logdir = /var/log/radius
raddbdir = /etc/raddb
radacctdir = ${logdir}/radacct
run_dir = ${localstatedir}/run/radiusd

#--- Идентификация узла в кластере -----------------------------------------
#  Берётся из переменной окружения RADIUS_NODE_ID (docker-compose)

name = radiusd

#--- Сетевые параметры -----------------------------------------------------

listen {
	type = auth
	ipaddr = *
	port = 1812
	limit {
		max_connections = 256
		lifetime = 0
		idle_timeout = 30
	}
}

listen {
	type = acct
	ipaddr = *
	port = 1813
	limit {
		max_connections = 256
		lifetime = 0
		idle_timeout = 30
	}
}

#--- Status server (для health checks) ------------------------------------

listen {
	type = status
	ipaddr = 127.0.0.1
	port = 18121
}

#--- CoA / Disconnect Messages (RFC 5176) ----------------------------------
#  Приём CoA-запросов от policy-engine и других систем

listen {
	type = coa
	ipaddr = *
	port = 3799
	limit {
		max_connections = 64
		lifetime = 0
		idle_timeout = 30
	}
}

#--- Производительность ----------------------------------------------------
#  Для 5000+ эндпоинтов: thread pool + connection pooling

thread pool {
	start_servers = 10
	max_servers = 64
	min_spare_servers = 5
	max_spare_servers = 20
	max_requests_per_server = 0
	auto_limit_acct = no
}

#--- Безопасность ----------------------------------------------------------

security {
	user = freerad
	group = freerad
	allow_core_dumps = no
	max_attributes = 200
	reject_delay = 1
	status_server = yes

	# Запрещаем уязвимые протоколы
	allow_vulnerable_openssl = no
}

#--- Логирование -----------------------------------------------------------

log {
	destination = stdout
	colourise = yes
	file = ${logdir}/radius.log
	syslog_facility = daemon
	stripped_names = no
	auth = yes
	auth_badpass = yes
	auth_goodpass = no
	msg_denied = "You are already logged in - access denied"
}

#--- Proxy (multi-site) ----------------------------------------------------

proxy_requests = yes
$INCLUDE proxy.conf

#--- Клиенты (NAS-устройства) ----------------------------------------------

$INCLUDE clients.conf

#--- Модули ----------------------------------------------------------------

modules {
	$INCLUDE mods-enabled/
}

#--- Политики --------------------------------------------------------------

policy {
	$INCLUDE policy.d/
}

#--- Виртуальные серверы ---------------------------------------------------

$INCLUDE sites-enabled/
