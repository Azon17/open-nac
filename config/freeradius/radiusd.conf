prefix = /usr
certdir = /etc/raddb/certs
db_dir = /var/lib/freeradius
exec_prefix = /usr
sysconfdir = /etc
localstatedir = /var
sbindir = ${exec_prefix}/sbin
logdir = /var/log/radius
raddbdir = /etc/raddb
radacctdir = ${logdir}/radacct
run_dir = ${localstatedir}/run/radiusd
name = radiusd
listen {
    type = status
    ipaddr = 127.0.0.1
    port = 18121
}
thread pool {
    start_servers = 10
    max_servers = 64
    min_spare_servers = 5
    max_spare_servers = 20
    max_requests_per_server = 0
}
security {
    max_attributes = 200
    reject_delay = 1
    status_server = yes
}
log {
    destination = stdout
    colourise = yes
    stripped_names = no
    auth = yes
    auth_badpass = yes
    auth_goodpass = yes
}
proxy_requests = yes
$INCLUDE proxy.conf
$INCLUDE clients.conf
modules {
    $INCLUDE mods-enabled/
}
policy {
    $INCLUDE policy.d/
}
server default {
    listen {
        type = auth
        ipaddr = *
        port = 0
    }
    listen {
        type = acct
        ipaddr = *
        port = 0
    }

    authorize {
        preprocess

        # 1. SQL — ищем пользователя в БД (пароль, группы)
        sql

        # 2. EAP — если EAP-Message, устанавливаем Auth-Type = EAP
        eap {
            ok = return
        }

        # 3. REST — вызываем Policy Engine для динамической авторизации
        #    Policy Engine возвращает VLAN, ACL, URL-redirect
        #    На основе: AD-группы, профиль устройства, posture, сайт
        nac_authorize

        # 4. PAP — если не EAP, проверяем пароль
        pap
    }

    authenticate {
        Auth-Type EAP {
            eap
        }
        Auth-Type PAP {
            pap
        }
        Auth-Type MS-CHAP {
            mschap
        }
    }

    post-auth {
        # Применяем VLAN/ACL из результата Policy Engine
        # REST-ответ уже добавлен в reply через nac_authorize

        # Логируем в SQL
        sql

        # Отправляем событие в Policy Engine (Kafka → ELK)
        nac_postauth

        # Логируем сертификатные атрибуты если EAP-TLS
        if (&TLS-Client-Cert-Serial) {
            update reply {
                &Reply-Message += "Cert-Auth: CN=%{TLS-Client-Cert-Common-Name}"
            }
        }

        Post-Auth-Type REJECT {
            sql
            nac_postauth
            attr_filter.access_reject
        }
    }

    accounting {
        sql
        nac_accounting
    }

    pre-proxy {
    }
    post-proxy {
        eap
    }
}
