###############################################################################
#  Open NAC — FreeRADIUS Proxy Configuration
#  Эквивалент: Cisco ISE Distributed Deployment (PSN node groups, proxy)
#
#  Multi-site: запросы маршрутизируются по realm
#    user@corp.local    → локальная обработка (default server)
#    user@branch-b.local → проксируется на FreeRADIUS в Branch B
#    user@branch-c.local → проксируется на FreeRADIUS в Branch C
#    user@partner.com    → проксируется на партнёрский RADIUS
#
#  Для RadSec (RADIUS over TLS): используйте type = "auth+acct"
#  с tls { ... } секцией в home_server
###############################################################################

#==================================================================
#  Home Servers — удалённые RADIUS-серверы (филиалы)
#==================================================================

#--- Branch B: FreeRADIUS pair ---

home_server branch-b-radius-1 {
	type = auth+acct
	ipaddr = ${BRANCH_B_RADIUS_1:-10.1.0.10}
	port = 1812
	secret = ${BRANCH_B_PROXY_SECRET:-changeme_proxy_b_secret}

	response_window = 10
	zombie_period = 40
	revive_interval = 300

	status_check = status-server
	check_interval = 30
	check_timeout = 5
	num_answers_to_alive = 3

	# Для RadSec (рекомендуется через WAN):
	# proto = tcp
	# tls {
	# 	private_key_file = /etc/raddb/certs/radsec-client.key
	# 	certificate_file = /etc/raddb/certs/radsec-client.pem
	# 	ca_file = /etc/raddb/certs/radsec-ca.pem
	# }
}

home_server branch-b-radius-2 {
	type = auth+acct
	ipaddr = ${BRANCH_B_RADIUS_2:-10.1.0.11}
	port = 1812
	secret = ${BRANCH_B_PROXY_SECRET:-changeme_proxy_b_secret}

	response_window = 10
	zombie_period = 40
	revive_interval = 300

	status_check = status-server
	check_interval = 30
	check_timeout = 5
	num_answers_to_alive = 3
}

#--- Branch C: FreeRADIUS pair ---

home_server branch-c-radius-1 {
	type = auth+acct
	ipaddr = ${BRANCH_C_RADIUS_1:-10.2.0.10}
	port = 1812
	secret = ${BRANCH_C_PROXY_SECRET:-changeme_proxy_c_secret}

	response_window = 10
	zombie_period = 40
	revive_interval = 300

	status_check = status-server
	check_interval = 30
}

home_server branch-c-radius-2 {
	type = auth+acct
	ipaddr = ${BRANCH_C_RADIUS_2:-10.2.0.11}
	port = 1812
	secret = ${BRANCH_C_PROXY_SECRET:-changeme_proxy_c_secret}

	response_window = 10
	zombie_period = 40
	revive_interval = 300

	status_check = status-server
	check_interval = 30
}

#==================================================================
#  Home Server Pools — группы серверов с балансировкой
#==================================================================

home_server_pool branch-b-pool {
	type = fail-over
	home_server = branch-b-radius-1
	home_server = branch-b-radius-2
}

home_server_pool branch-c-pool {
	type = fail-over
	home_server = branch-c-radius-1
	home_server = branch-c-radius-2
}

#--- Пул "все сайты" для round-robin (если нужно) ---
# home_server_pool all-sites-pool {
# 	type = client-balance
# 	home_server = branch-b-radius-1
# 	home_server = branch-c-radius-1
# }

#==================================================================
#  Realms — маршрутизация по домену
#==================================================================

#--- Локальный realm (обрабатывается на этом сервере) ---
realm LOCAL {
	# Пустое тело = обработка локально
}

realm NULL {
	# Username без @ → локальная обработка
}

#--- Основной корпоративный домен ---
realm corp.local {
	# Обработка локально (HQ AD)
}

#--- Branch B ---
realm branch-b.local {
	auth_pool = branch-b-pool
	acct_pool = branch-b-pool
	nostrip
}

#--- Branch C ---
realm branch-c.local {
	auth_pool = branch-c-pool
	acct_pool = branch-c-pool
	nostrip
}

#--- Партнёрские домены (пример) ---
# realm partner.com {
# 	auth_pool = partner-pool
# 	acct_pool = partner-pool
# 	nostrip
# }

#--- DEFAULT: неизвестные realm → локальная обработка ---
realm DEFAULT {
	# Все неизвестные realm обрабатываются локально
	# Для отклонения: auth_pool = reject
}
