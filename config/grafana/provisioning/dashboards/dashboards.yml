apiVersion: 1

providers:
  - name: "Open NAC Dashboards"
    orgId: 1
    folder: "Open NAC"
    folderUid: "opennac"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
