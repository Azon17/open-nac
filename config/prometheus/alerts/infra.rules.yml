# ============================================================================
# Open NAC — Infrastructure Alert Rules
# Path: config/prometheus/alerts/infra.rules.yml
# ============================================================================
groups:

  - name: infrastructure
    rules:
      - alert: NodeDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Target {{ $labels.job }}/{{ $labels.instance }} is DOWN"

      - alert: HighCpuUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High CPU on {{ $labels.instance }}: {{ $value | printf \"%.1f\" }}%"

      - alert: CriticalCpuUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 2m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Critical CPU on {{ $labels.instance }}: {{ $value | printf \"%.1f\" }}%"

      - alert: HighMemoryUsage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Memory usage {{ $value | printf \"%.1f\" }}% on {{ $labels.instance }}"

      - alert: DiskSpaceLow
        expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes) * 100 > 80
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Disk {{ $labels.mountpoint }} at {{ $value | printf \"%.1f\" }}%"

      - alert: DiskSpaceCritical
        expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes) * 100 > 90
        for: 2m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Disk {{ $labels.mountpoint }} at {{ $value | printf \"%.1f\" }}% — CRITICAL"

      - alert: DiskWillFillIn24Hours
        expr: predict_linear(node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}[6h], 24*3600) < 0
        for: 30m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Disk {{ $labels.mountpoint }} projected full within 24h"

  - name: galera
    rules:
      - alert: GaleraClusterSizeDegraded
        expr: mysql_global_status_wsrep_cluster_size < 3
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Galera cluster has only {{ $value }} nodes (expected 3)"

      - alert: GaleraNodeNotReady
        expr: mysql_global_status_wsrep_ready != 1
        for: 30s
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Galera node {{ $labels.instance }} is NOT READY"

      - alert: GaleraNodeDesync
        expr: mysql_global_status_wsrep_local_state != 4
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Galera node {{ $labels.instance }} desynced (state={{ $value }})"

      - alert: GaleraFlowControlPaused
        expr: rate(mysql_global_status_wsrep_flow_control_paused_ns[5m]) / 1e9 > 0.5
        for: 3m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Galera flow control paused >50% on {{ $labels.instance }}"

      - alert: GaleraSlowQueries
        expr: rate(mysql_global_status_slow_queries[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Slow queries: {{ $value | printf \"%.2f\" }}/s"

      - alert: MariaDBConnectionsHigh
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "MariaDB connections at {{ $value | printf \"%.0f\" }}% of max"

      - alert: MariaDBDown
        expr: mysql_up == 0
        for: 30s
        labels:
          severity: critical
          component: database
        annotations:
          summary: "MariaDB exporter cannot connect"

  - name: redis
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 30s
        labels:
          severity: critical
          component: cache
        annotations:
          summary: "Redis {{ $labels.instance }} is DOWN"

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis memory at {{ $value | printf \"%.0f\" }}%"

      - alert: RedisHighKeyEviction
        expr: rate(redis_evicted_keys_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis evicting {{ $value | printf \"%.1f\" }} keys/s"

      - alert: RedisSentinelDown
        expr: redis_sentinel_master_ok == 0
        for: 30s
        labels:
          severity: critical
          component: cache
        annotations:
          summary: "Redis Sentinel reports master unhealthy"

  - name: kafka
    rules:
      - alert: KafkaConsumerLag
        expr: kafka_consumergroup_lag_sum > 10000
        for: 5m
        labels:
          severity: warning
          component: messaging
        annotations:
          summary: "Consumer group {{ $labels.consumergroup }} lag: {{ $value }}"

      - alert: KafkaConsumerLagCritical
        expr: kafka_consumergroup_lag_sum > 50000
        for: 3m
        labels:
          severity: critical
          component: messaging
        annotations:
          summary: "Consumer group {{ $labels.consumergroup }} lag critical: {{ $value }}"

      - alert: KafkaBrokerDown
        expr: kafka_brokers < 1
        for: 30s
        labels:
          severity: critical
          component: messaging
        annotations:
          summary: "No Kafka brokers available"

      - alert: KafkaUnderReplicatedPartitions
        expr: kafka_topic_partition_under_replicated_partition > 0
        for: 5m
        labels:
          severity: warning
          component: messaging
        annotations:
          summary: "Topic {{ $labels.topic }} under-replicated"

  - name: certificates
    rules:
      - alert: CertificateExpiring30Days
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 30
        for: 1h
        labels:
          severity: warning
          component: certificates
        annotations:
          summary: "Cert for {{ $labels.instance }} expires in {{ $value | printf \"%.0f\" }} days"

      - alert: CertificateExpiring7Days
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 7
        for: 30m
        labels:
          severity: critical
          component: certificates
        annotations:
          summary: "Cert for {{ $labels.instance }} expires in {{ $value | printf \"%.0f\" }} days — URGENT"

      - alert: CertificateExpired
        expr: (probe_ssl_earliest_cert_expiry - time()) < 0
        for: 0m
        labels:
          severity: critical
          component: certificates
        annotations:
          summary: "Certificate for {{ $labels.instance }} has EXPIRED"

  - name: service-probes
    rules:
      - alert: ServiceTCPUnreachable
        expr: probe_success{job="blackbox-tcp"} == 0
        for: 1m
        labels:
          severity: critical
          component: connectivity
        annotations:
          summary: "TCP probe failed for {{ $labels.instance }}"
