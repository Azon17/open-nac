# ============================================================================
# Open NAC — Nginx reverse proxy snippet for Admin UI → Prometheus
# Add this inside the existing server { } block in nginx.conf
# ============================================================================

    # Proxy Prometheus API for Admin UI dashboard widgets
    location /api/prometheus/ {
        proxy_pass http://prometheus:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;

        # CORS for dashboard widgets
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";

        # Read-only: only allow GET
        limit_except GET {
            deny all;
        }
    }

    # Proxy Alertmanager webhook (receives alerts from Alertmanager)
    location /api/v1/alerts/webhook {
        # Your backend handler for alert webhooks
        proxy_pass http://localhost:8080/api/v1/alerts/webhook;
        proxy_set_header Content-Type application/json;
    }

    # Grafana iframe embedding (optional — for embedded panels)
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
